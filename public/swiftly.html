<script>
/* Minimal React.createElement shim — the source component uses
   React.createElement(...) in a couple of places purely to build small SVG
   icons (sun/moon, play/pause) as DOM-node-valued renderVals() fields. This
   shim builds real DOM nodes so those bindings render correctly without
   pulling in the full React/ReactDOM runtime. */
(function(){
  'use strict';
  const SVG_TAGS = new Set(['svg','circle','line','path','rect','g','polygon','polyline','ellipse']);
  function createElement(tag, props, ...children){
    props = props || {};
    const isSvg = SVG_TAGS.has(tag);
    const el = isSvg
      ? document.createElementNS('http://www.w3.org/2000/svg', tag)
      : document.createElement(tag);
    Object.keys(props).forEach(k=>{
      if(k==='key') return;
      if(k==='children') return;
      if(k==='strokeWidth'){ el.setAttribute('stroke-width', props[k]); return; }
      if(k==='strokeLinecap'){ el.setAttribute('stroke-linecap', props[k]); return; }
      el.setAttribute(k, props[k]);
    });
    // flatten children (arrays from .map(...) calls included)
    const flat = [];
    (function walk(arr){
      arr.forEach(c=>{
        if(Array.isArray(c)) walk(c);
        else if(c!=null) flat.push(c);
      });
    })(children);
    flat.forEach(c=>{
      if(c && c.nodeType){ el.appendChild(c); }
      else { el.appendChild(document.createTextNode(String(c))); }
    });
    return el;
  }
  window.React = { createElement };
})();

/* Minimal DCLogic base class — provides React-Component-like setState/state
   semantics so the original Component class (extends DCLogic) runs unmodified.
   setState supports both an object patch and an updater function (s => patch),
   matching the calls used throughout Swiftly.dc.html. */
(function(){
  'use strict';
  class DCLogic {
    constructor(props){
      this.props = props || {};
      this.state = this.state || {};
      this._mounted = false;
      this._pendingRaf = null;
    }
    setState(patch){
      const next = (typeof patch === 'function') ? patch(this.state) : patch;
      this.state = Object.assign({}, this.state, next);
      this._scheduleRender();
    }
    _scheduleRender(){
      // Batch into a single rAF so rapid setState calls (e.g. slider drags) don't
      // thrash the DOM, matching React's batching behavior closely enough.
      if(this._pendingRaf) return;
      this._pendingRaf = requestAnimationFrame(()=>{
        this._pendingRaf = null;
        const prevProps = this.__prevProps, prevState = this.__prevState;
        this.__prevProps = this.props; this.__prevState = this.state;
        if(this.__render) this.__render();
        if(this.componentDidUpdate) this.componentDidUpdate(prevProps, prevState);
      });
    }
    _mount(){
      this._mounted = true;
      this.__prevProps = this.props; this.__prevState = this.state;
      if(this.__render) this.__render();
      if(this.componentDidMount) this.componentDidMount();
    }
  }
  window.DCLogic = DCLogic;
})();

</script>
<script>
/* ============================================================================
   Minimal "x-dc" template runtime.
   Interprets the same template grammar as the source .dc.html file:
     {{ expr }}                         -> value lookup against the latest renderVals()
     <sc-if value="{{ expr }}">...</sc-if>      -> conditional render
     <sc-for list="{{ expr }}" as="x">...</sc-for> -> list render, {{ x.field }} inside
     onClick/onInput/onFocus="{{ expr }}"        -> event handler binding
     value="{{ expr }}" on <input>                -> controlled value binding
   This lets the original component template + class run as a plain, dependency-
   free single HTML file (besides MapLibre GL, loaded from CDN for the map).
   ============================================================================ */
(function(){
  'use strict';

  // ---- expression evaluator -------------------------------------------------
  // Expressions inside {{ }} are simple property paths optionally with one
  // level of dot-access, e.g. "c.name", "b.t", "ins.officers". We resolve them
  // against a scope chain: [forLoopVars..., rootVals].
  function resolvePath(scopeChain, path){
    path = path.trim();
    for(let i=scopeChain.length-1;i>=0;i--){
      const scope = scopeChain[i];
      const parts = path.split('.');
      if(Object.prototype.hasOwnProperty.call(scope, parts[0])){
        let v = scope[parts[0]];
        for(let j=1;j<parts.length;j++){
          if(v==null) return v;
          v = v[parts[j]];
        }
        return v;
      }
    }
    return undefined;
  }

  function evalExpr(scopeChain, expr){
    expr = expr.trim();
    if(expr.startsWith('!')){
      return !evalExpr(scopeChain, expr.slice(1));
    }
    // expr like "x" or "x.y" — handled by resolvePath. Anything fancier isn't needed
    // because the source template only ever uses simple dotted paths (with an
    // optional leading "!") in bindings.
    return resolvePath(scopeChain, expr);
  }

  // Replace every {{ expr }} in a string with the resolved value (string-coerced).
  function interpolate(str, scopeChain){
    return str.replace(/\{\{\s*([^}]+?)\s*\}\}/g, (m, expr) => {
      const v = evalExpr(scopeChain, expr);
      if(v == null) return '';
      if(typeof v === 'boolean') return v ? 'true':'false';
      return String(v);
    });
  }

  // ---- DOM-based template walker --------------------------------------------
  // We operate on a live DOM fragment (parsed once from the template HTML
  // string) and re-walk it on every render, building a fresh output fragment.
  // Event handlers and controlled inputs are bound directly during the walk.

  let HANDLER_SEQ = 0;
  function bindEvents(srcNode, liveEl, scopeChain){
    ['onClick','onInput','onFocus','onChange','onMouseEnter','onMouseLeave'].forEach(attr=>{
      const raw = srcNode.getAttribute && srcNode.getAttribute(attr);
      if(raw==null) return;
      const m = raw.match(/^\{\{\s*([^}]+?)\s*\}\}$/);
      if(!m) return;
      const fn = evalExpr(scopeChain, m[1]);
      if(typeof fn === 'function'){
        const domEvt = attr.slice(2).toLowerCase();
        liveEl.addEventListener(domEvt, fn);
      }
    });
    // controlled value binding: value="{{ expr }}" on input/textarea — read from the
    // pristine source node (the live clone never had a "value" attribute copied for
    // inputs we want to control via .value rather than the attribute).
    if(srcNode.tagName === 'INPUT' || srcNode.tagName === 'TEXTAREA'){
      const raw = srcNode.getAttribute('value');
      if(raw){
        const m = raw.match(/^\{\{\s*([^}]+?)\s*\}\}$/);
        if(m){
          const v = evalExpr(scopeChain, m[1]);
          liveEl.value = v==null?'':v;
          liveEl.removeAttribute('value');
        }
      }
    }
  }

  function interpolateAttrs(el, scopeChain){
    if(!el.attributes) return;
    Array.from(el.attributes).forEach(attr=>{
      if(/^on[A-Z]/.test(attr.name)) return; // handled separately
      if(attr.value.indexOf('{{')!==-1){
        el.setAttribute(attr.name, interpolate(attr.value, scopeChain));
      }
    });
  }

  // Recursively render a template node into a new node, given the scope chain.
  function renderNode(node, scopeChain, rootVals){
    if(node.nodeType === Node.TEXT_NODE){
      const txt = node.textContent;
      if(txt.indexOf('{{')===-1) return document.createTextNode(txt);
      // Special case: a text node whose ENTIRE content is a single {{ expr }}
      // may resolve to a DOM node (icons built via the React.createElement shim).
      const soleMatch = txt.trim().match(/^\{\{\s*([^}]+?)\s*\}\}$/);
      if(soleMatch){
        const v = evalExpr(scopeChain, soleMatch[1]);
        if(v && v.nodeType) return v;
      }
      return document.createTextNode(interpolate(txt, scopeChain));
    }
    if(node.nodeType === Node.COMMENT_NODE){
      return null; // drop comments
    }
    if(node.nodeType !== Node.ELEMENT_NODE) return null;

    const tag = node.tagName.toLowerCase();

    if(tag === 'sc-if'){
      const raw = node.getAttribute('value') || '';
      const m = raw.match(/^\{\{\s*([^}]+?)\s*\}\}$/);
      const cond = m ? evalExpr(scopeChain, m[1]) : false;
      if(!cond) return null;
      const frag = document.createDocumentFragment();
      Array.from(node.childNodes).forEach(child=>{
        const out = renderNode(child, scopeChain, rootVals);
        if(out) frag.appendChild(out);
      });
      return frag;
    }

    if(tag === 'sc-for'){
      const listRaw = node.getAttribute('list') || '';
      const asName = node.getAttribute('as') || 'item';
      const m = listRaw.match(/^\{\{\s*([^}]+?)\s*\}\}$/);
      const list = m ? evalExpr(scopeChain, m[1]) : [];
      const frag = document.createDocumentFragment();
      (list||[]).forEach((item)=>{
        const loopScope = {}; loopScope[asName] = item;
        const innerChain = scopeChain.concat([loopScope]);
        Array.from(node.childNodes).forEach(child=>{
          const out = renderNode(child, innerChain, rootVals);
          if(out) frag.appendChild(out);
        });
      });
      return frag;
    }

    // Regular element — clone shallow (namespace-aware for SVG), interpolate attrs, bind events, recurse children
    const SVG_TAGS = new Set(['svg','circle','line','path','rect','g','polygon','polyline','ellipse','defs','lineargradient','stop','clippath','text','tspan']);
    const clone = SVG_TAGS.has(tag)
      ? document.createElementNS('http://www.w3.org/2000/svg', node.tagName)
      : document.createElement(node.tagName);
    // IMPORTANT: on* attribute names (onclick, oninput, ...) are "magic" in the DOM —
    // setAttribute('onclick', someString) makes the browser compile that STRING as a
    // JS function body, which silently breaks our "{{ expr }}" placeholder syntax.
    // So we resolve handlers straight from the template source node and attach them
    // via addEventListener, and never copy on* attributes onto the live clone at all.
    Array.from(node.attributes||[]).forEach(attr=>{
      if(/^on[A-Za-z]/.test(attr.name)) return; // skip magic event attrs entirely
      clone.setAttribute(attr.name, attr.value);
    });
    interpolateAttrs(clone, scopeChain);
    bindEvents(node, clone, scopeChain);
    Array.from(node.childNodes).forEach(child=>{
      const out = renderNode(child, scopeChain, rootVals);
      if(out) clone.appendChild(out);
    });
    return clone;
  }

  // ---- public API -------------------------------------------------------
  // mount(templateHtml, mountEl, ComponentInstance)
  // ComponentInstance must expose: .renderVals() -> plain object of bindings
  // and trigger .__render() (assigned by us) whenever state changes.
  function mount(templateHtml, mountEl, instance){
    const tpl = document.createElement('template');
    tpl.innerHTML = templateHtml;
    const root = tpl.content;

    function doRender(){
      const vals = instance.renderVals();
      const out = document.createDocumentFragment();
      Array.from(root.childNodes).forEach(child=>{
        const node = renderNode(child, [vals], vals);
        if(node) out.appendChild(node);
      });
      mountEl.innerHTML = '';
      mountEl.appendChild(out);
    }
    instance.__render = doRender;
    doRender();
    return doRender;
  }

  window.DCRuntime = { mount };
})();

</script>

<div data-theme="{{ theme }}" style="position:fixed;inset:0;background:var(--bg);color:var(--text);font-family:'Inter',sans-serif;transition:background .5s ease,color .4s ease;">

  <!-- ============ MAP STAGE · real MapLibre GL (OpenFreeMap vector tiles + 3D buildings) ============ -->
  <div style="position:absolute;inset:0;overflow:hidden;background:var(--bg);">
    <div id="swiftly-map" style="position:absolute;inset:0;"></div>
    <!-- cinematic vignette + scanline, above tiles / below panels -->
    <div style="position:absolute;inset:0;pointer-events:none;z-index:1;background:radial-gradient(150% 120% at 50% 40%,transparent 56%,var(--bg) 100%);opacity:.9;"></div>
    <div style="position:absolute;left:0;right:0;height:170px;pointer-events:none;z-index:1;opacity:.16;background:linear-gradient(rgba(6,182,212,.18),transparent);animation:scan 9s linear infinite;"></div>
  </div>

  <!-- ============ LEFT MODULE RAIL (docked command console) ============ -->
  <div style="position:absolute;top:18px;left:18px;bottom:18px;width:78px;z-index:42;display:flex;flex-direction:column;align-items:center;gap:5px;padding:14px 8px;border-radius:16px;background:var(--glass);backdrop-filter:blur(22px) saturate(150%);-webkit-backdrop-filter:blur(22px) saturate(150%);border:1px solid var(--glassbrd);box-shadow:var(--shadow);">
    <div style="width:36px;height:36px;border-radius:10px;background:linear-gradient(135deg,var(--primary),var(--secondary));display:flex;align-items:center;justify-content:center;box-shadow:0 0 18px rgba(99,102,241,.5);margin-bottom:8px;flex:none;">
      <svg width="19" height="19" viewBox="0 0 24 24" fill="#fff"><path d="M12 2 L21 20 L12 15 L3 20 Z"/></svg>
    </div>
    <sc-for list="{{ navRail }}" as="m" hint-placeholder-count="8">
      <button onClick="{{ m.onClick }}" title="{{ m.label }}" style="width:100%;display:flex;flex-direction:column;align-items:center;gap:4px;padding:8px 2px;border:none;border-radius:11px;background:{{ m.bg }};color:{{ m.fg }};cursor:pointer;font-family:inherit;transition:all .2s;box-shadow:{{ m.sh }};">
        <span style="font-size:15px;line-height:1;">{{ m.icon }}</span>
        <span style="font-size:7.5px;font-weight:700;letter-spacing:.02em;text-align:center;line-height:1.15;">{{ m.label }}</span>
      </button>
    </sc-for>
  </div>

  <!-- ============ TOP NAV ============ -->
  <header style="position:absolute;top:18px;left:108px;right:18px;height:58px;display:flex;align-items:center;gap:14px;padding:0 14px 0 16px;border-radius:14px;background:var(--glass);backdrop-filter:blur(22px) saturate(150%);-webkit-backdrop-filter:blur(22px) saturate(150%);border:1px solid var(--glassbrd);box-shadow:var(--shadow);z-index:40;">
    <div style="display:flex;align-items:center;gap:10px;">
      <div style="width:34px;height:34px;border-radius:9px;background:linear-gradient(135deg,var(--primary),var(--secondary));display:flex;align-items:center;justify-content:center;box-shadow:0 0 18px rgba(99,102,241,.5);flex:none;">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none"><path d="M12 2 L21 20 L12 15 L3 20 Z" fill="#fff"/></svg>
      </div>
      <div style="line-height:1.05;">
        <div style="font-size:16px;font-weight:800;letter-spacing:.16em;">SWIFTLY</div>
        <div style="font-size:9.5px;font-weight:600;letter-spacing:.14em;color:var(--dim);text-transform:uppercase;">Towards an Unjammed Bengaluru</div>
      </div>
    </div>

    <!-- Bengaluru Traffic Police badge -->
    <div title="Official data partner" style="display:flex;align-items:center;gap:7px;padding:7px 11px;border-radius:9px;background:var(--glass2);border:1px solid var(--glassbrd);flex:none;">
      <span style="width:22px;height:22px;border-radius:50%;background:linear-gradient(135deg,#1e3a8a,#1e40af);display:flex;align-items:center;justify-content:center;flex:none;">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.4"><path d="M12 2 4 6v6c0 5 3.5 8 8 10 4.5-2 8-5 8-10V6z"/></svg>
      </span>
      <div style="line-height:1.1;"><div style="font-size:9px;font-weight:700;letter-spacing:.06em;color:var(--text);">BTP · ASTraM</div><div style="font-size:7.5px;font-weight:600;color:var(--faint);letter-spacing:.04em;">DATA PARTNER</div></div>
    </div>

    <div style="display:flex;align-items:center;gap:10px;padding:8px 14px;border-radius:10px;background:var(--glass2);border:1px solid var(--glassbrd);flex:none;">
      <span style="width:7px;height:7px;border-radius:50%;background:var(--secondary);box-shadow:0 0 8px var(--secondary);"></span>
      <span style="font-size:9px;font-weight:700;letter-spacing:.14em;color:var(--faint);text-transform:uppercase;">Module</span>
      <span style="font-size:13px;font-weight:700;letter-spacing:.02em;color:var(--text);">{{ moduleName }}</span>
    </div>
    <div style="display:flex;align-items:center;gap:6px;font-size:11px;font-weight:600;color:var(--faint);flex:none;white-space:nowrap;">
      <span style="width:5px;height:5px;border-radius:50%;background:var(--success);"></span>{{ eventCorridors }} corridors live
    </div>

    <!-- Global search -->
    <div style="flex:1;min-width:120px;max-width:280px;display:flex;align-items:center;gap:8px;padding:7px 12px;border-radius:9px;background:var(--glass2);border:1px solid var(--glassbrd);">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="var(--faint)" stroke-width="2.2" style="flex:none;"><circle cx="11" cy="11" r="7"/><path d="m21 21-4.3-4.3"/></svg>
      <input value="{{ globalSearchText }}" onInput="{{ onGlobalSearch }}" placeholder="Search corridor, event ID, zone…" style="flex:1;min-width:0;background:none;border:none;outline:none;font-family:inherit;font-size:11.5px;font-weight:500;color:var(--text);"/>
    </div>

    <div style="margin-left:auto;display:flex;align-items:center;gap:10px;flex:none;">
      <!-- Command alerts -->
      <div style="position:relative;">
        <button onClick="{{ toggleAlerts }}" title="Command alerts" style="width:36px;height:36px;border-radius:9px;border:1px solid var(--glassbrd);background:var(--glass2);color:var(--text);cursor:pointer;display:flex;align-items:center;justify-content:center;position:relative;">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 8a6 6 0 1 0-12 0c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>
          <sc-if value="{{ hasAlerts }}" hint-placeholder-val="{{ true }}">
            <span style="position:absolute;top:-3px;right:-3px;width:16px;height:16px;border-radius:50%;background:var(--critical);color:#fff;font-size:9px;font-weight:800;display:flex;align-items:center;justify-content:center;font-family:'JetBrains Mono',monospace;box-shadow:0 0 6px var(--critical);">{{ alertCount }}</span>
          </sc-if>
        </button>
        <sc-if value="{{ alertsOpen }}" hint-placeholder-val="{{ false }}">
          <div style="position:absolute;top:44px;right:0;width:300px;border-radius:12px;background:var(--surface);border:1px solid var(--glassbrd);box-shadow:0 18px 40px rgba(0,0,0,.6);overflow:hidden;z-index:60;">
            <div style="padding:11px 14px;border-bottom:1px solid var(--glassbrd);font-size:11px;font-weight:700;letter-spacing:.06em;">COMMAND ALERTS</div>
            <div style="max-height:280px;overflow-y:auto;">
              <sc-for list="{{ alertsList }}" as="a" hint-placeholder-count="3">
                <div style="padding:10px 14px;border-bottom:1px solid var(--glassbrd);display:flex;gap:9px;align-items:flex-start;">
                  <span style="width:7px;height:7px;border-radius:50%;background:{{ a.color }};margin-top:4px;flex:none;box-shadow:0 0 6px {{ a.color }};"></span>
                  <div><div style="font-size:11.5px;font-weight:600;color:var(--text);">{{ a.title }}</div><div style="font-size:10px;color:var(--faint);margin-top:2px;">{{ a.detail }}</div></div>
                </div>
              </sc-for>
            </div>
          </div>
        </sc-if>
      </div>
      <!-- Real ASTraM + Mappls feed status -->
      <div style="display:flex;align-items:center;gap:7px;padding:7px 11px;border-radius:9px;background:var(--glass2);border:1px solid var(--glassbrd);">
        <span style="width:7px;height:7px;border-radius:50%;background:var(--success);box-shadow:0 0 8px var(--success);animation:coreP 1.6s infinite;"></span>
        <span style="font-size:10.5px;font-weight:600;color:var(--dim);">ASTraM</span>
        <span style="font-size:10.5px;font-weight:700;font-family:'JetBrains Mono',monospace;color:var(--success);">LIVE</span>
      </div>
      <div style="display:flex;align-items:center;gap:7px;padding:7px 11px;border-radius:9px;background:var(--glass2);border:1px solid var(--glassbrd);">
        <span style="width:7px;height:7px;border-radius:50%;background:{{ mapplsDot }};box-shadow:0 0 8px {{ mapplsDot }};"></span>
        <span style="font-size:10.5px;font-weight:600;color:var(--dim);">Mappls</span>

                </div>
              </sc-for>
            </div>
          </div>
        </div>
        <div style="padding:18px;border-radius:16px;background:var(--glass);backdrop-filter:blur(24px);border:1px solid var(--glassbrd);box-shadow:var(--shadow);">
          <div style="font-size:12.5px;font-weight:700;letter-spacing:.04em;margin-bottom:3px;">Resource Effectiveness</div>
          <div style="font-size:10px;color:var(--faint);margin-bottom:14px;">Deployment effectiveness by corridor — Stage 3 ILP output</div>
          <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:8px;">
            <sc-for list="{{ effectivenessCards }}" as="e" hint-placeholder-count="4">
              <div style="padding:12px;border-radius:10px;background:var(--glass2);border:1px solid var(--glassbrd);">
                <div style="font-size:10.5px;font-weight:600;margin-bottom:6px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">{{ e.name }}</div>
                <div style="font-family:'JetBrains Mono',monospace;font-size:18px;font-weight:700;color:var(--success);">{{ e.eff }}</div>
                <div style="font-size:9px;color:var(--faint);margin-top:2px;">effectiveness</div>
              </div>
            </sc-for>
          </div>
        </div>
      </div>
    </div>
  </sc-if>

  <!-- ============ TIMELINE (map + command) ============ -->
  <sc-if value="{{ showTimeline }}" hint-placeholder-val="{{ true }}">
    <div style="position:absolute;left:50%;bottom:20px;transform:translateX(-50%);width:min(640px,72vw);z-index:38;padding:14px 20px 16px;border-radius:14px;background:var(--glass);backdrop-filter:blur(22px) saturate(150%);-webkit-backdrop-filter:blur(22px);border:1px solid var(--glassbrd);box-shadow:var(--shadow);">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:11px;">
        <div style="display:flex;align-items:center;gap:9px;">
          <button onClick="{{ playTimeline }}" style="width:30px;height:30px;border-radius:8px;border:1px solid var(--glassbrd);background:linear-gradient(135deg,var(--primary),var(--secondary));display:flex;align-items:center;justify-content:center;cursor:pointer;box-shadow:0 0 14px rgba(99,102,241,.45);color:#fff;">{{ playIcon }}</button>
          <div style="white-space:nowrap;">
            <div style="font-size:9.5px;font-weight:700;letter-spacing:.14em;color:var(--dim);text-transform:uppercase;">Prediction Horizon</div>
            <div style="font-size:13.5px;font-weight:700;font-family:'JetBrains Mono',monospace;color:var(--secondary);margin-top:1px;">{{ tLabel }}</div>
          </div>
        </div>
        <div style="display:flex;align-items:center;gap:5px;font-size:10.5px;color:var(--faint);font-weight:600;">
          <span style="width:8px;height:8px;border-radius:50%;background:var(--success)"></span>Free
          <span style="width:8px;height:8px;border-radius:50%;background:var(--amber);margin-left:8px"></span>Mod
          <span style="width:8px;height:8px;border-radius:50%;background:var(--warning);margin-left:8px"></span>Heavy
          <span style="width:8px;height:8px;border-radius:50%;background:var(--critical);margin-left:8px"></span>Severe
        </div>
      </div>
      <div style="position:relative;height:30px;">
        <div style="position:absolute;left:0;right:0;top:13px;height:4px;border-radius:3px;background:linear-gradient(90deg,var(--success),var(--amber),var(--warning),var(--critical));opacity:.5;"></div>
        <div style="position:absolute;left:0;top:13px;height:4px;border-radius:3px;width:{{ tPct }};background:linear-gradient(90deg,var(--primary),var(--secondary));box-shadow:0 0 10px var(--secondary);transition:width .4s;"></div>
        <sc-for list="{{ tStops }}" as="s" hint-placeholder-count="4">
          <button onClick="{{ s.onClick }}" style="position:absolute;left:{{ s.pos }};top:0;transform:translateX(-50%);display:flex;flex-direction:column;align-items:center;gap:5px;border:none;background:none;cursor:pointer;">
            <span style="width:{{ s.size }};height:{{ s.size }};border-radius:50%;background:{{ s.fill }};border:2px solid {{ s.brd }};box-shadow:{{ s.glow }};transition:all .3s;"></span>
            <span style="font-size:10px;font-weight:700;font-family:'JetBrains Mono',monospace;color:{{ s.fg }};">{{ s.label }}</span>
          </button>
        </sc-for>
      </div>
    </div>
  </sc-if>

  <!-- map credit -->
  <div style="position:absolute;left:112px;bottom:22px;z-index:30;display:flex;align-items:center;gap:10px;padding:7px 12px;border-radius:9px;background:var(--glass);backdrop-filter:blur(12px);border:1px solid var(--glassbrd);font-size:10px;color:var(--dim);font-weight:600;">
    <span style="display:flex;align-items:center;gap:7px;">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none"><circle cx="12" cy="10" r="3" fill="var(--secondary)"/><path d="M12 2C7.6 2 4 5.6 4 10c0 5.5 8 12 8 12s8-6.5 8-12c0-4.4-3.6-8-8-8z" stroke="var(--secondary)" stroke-width="1.6"/></svg>
      Powered by <b style="color:var(--text)">MapmyIndia · Mappls</b>
    </span>
    <span style="width:1px;height:14px;background:var(--glassbrd);"></span>
    <span style="display:flex;align-items:center;gap:6px;">
      <span style="width:6px;height:6px;border-radius:50%;background:{{ mapplsDot }};box-shadow:0 0 8px {{ mapplsDot }};"></span>
      <span style="font-family:'JetBrains Mono',monospace;font-size:9.5px;font-weight:700;letter-spacing:.02em;">{{ mapplsLabel }}</span>
    </span>
  </div>

</div>

</script>

<script>
class Component extends DCLogic {
  state = {
    theme:'dark', view:'map', t:0, playing:false, activeModule:'overview', copilotOpen:false,
    duration:3, closure:20,
    selId:'varthur-road', eventType:'Political Rally',
    crowd:12000, whatIf:{officers:false,barricades:false,diversion:false},
    clock:'',
    srcText:'MG Road, Bengaluru', srcOpen:false, srcResults:[],
    venueText:'Sree Kanteerava Stadium', venueOpen:false, venueResults:[],
    eventLoc:{name:'Sree Kanteerava Stadium',lng:77.5959,lat:12.9698}, simRun:0,
    mapplsStatus:'connecting', routeInfo:null, replayIdx:0, copilotTurns:[],
    globalSearchText:'', alertsOpen:false
  };

  componentDidMount(){
    this._tick();
    this._clk = setInterval(()=>this._tick(), 1000);
    // Swallow benign AbortError tile-fetch rejections from map camera moves
    this._rej = (ev)=>{ const r=ev&&ev.reason; const n=r&&(r.name||r.message)||''; if(/abort/i.test(n)){ ev.preventDefault(); } };
    window.addEventListener('unhandledrejection', this._rej);
    // Geocoding is implemented inline (see _geocode below) so it never depends on a
    // module loader or sibling file — this is the fix for the "map doesn't move" bug,
    // which was caused by a dynamic import() that silently fails outside a dev server.
    this.setState({mapplsStatus:'connecting'});
    const timeout = new Promise((_,rej)=>setTimeout(()=>rej(new Error('timeout')),3500));
    Promise.race([this._mapplsToken(), timeout])
      .then(()=>this.setState({mapplsStatus:'live'}))
      .catch(()=>this.setState({mapplsStatus:'standby'}));
    // Real interactive base map — MapLibre GL + CARTO tiles
    this._initMap();
  }

  // ----- Mappls OAuth (best-effort; CORS-fails outside a whitelisted domain, which is
  //       expected — the UI never depends on this succeeding) -----
  _mapplsToken(){
    const MAPPLS_ID='96dHZVzsAus_QA2QJKBJLhuMn4yq8oWmy4afT9BBJz6R0L_AajBBoKQzkgWKD2qAxW6yLnzEEOa4ocF_DzSIJXCvrfU0ch9U';
    const MAPPLS_SECRET='lrFxI-iSEg-1X8uZ_70Q5hp8DnoyZdWXo0sJyDSA5IooAQb4CMMfyanhiN_HN-cl3MJ-taHWXZY5Tj8-jGu45HQ9BacCmd9s5rg9ge87bos=';
    const body=new URLSearchParams({grant_type:'client_credentials',client_id:MAPPLS_ID,client_secret:MAPPLS_SECRET});
    return fetch('https://outpost.mappls.com/api/security/oauth/token',{method:'POST',body})
      .then(r=>r.json()).then(j=>{ if(!j.access_token) throw new Error('no token'); return j.access_token; });
  }
  // ----- Geocoding: OpenStreetMap Nominatim (CORS-enabled, no key) with an offline
  //       Bengaluru gazetteer fallback so the search box always returns something. -----
  _gazetteer(){
    return [
      {name:'Sree Kanteerava Stadium',address:'Kasturba Road, Bengaluru',lat:12.9698,lng:77.5959},
      {name:'M Chinnaswamy Stadium',address:'Cubbon Park, Bengaluru',lat:12.9788,lng:77.5996},
      {name:'Palace Grounds',address:'Jayamahal, Bengaluru',lat:13.0007,lng:77.5905},
      {name:'MG Road',address:'Bengaluru, Karnataka',lat:12.9756,lng:77.6068},
      {name:'Silk Board Junction',address:'BTM Layout, Bengaluru',lat:12.9166,lng:77.6225},
      {name:'Whitefield',address:'Whitefield Main Road, Bengaluru',lat:12.9698,lng:77.7500},
      {name:'Kempegowda International Airport',address:'Devanahalli, Bengaluru',lat:13.1986,lng:77.7066},
      {name:'Marathahalli Bridge',address:'Outer Ring Road, Bengaluru',lat:12.9568,lng:77.7011},
      {name:'Electronic City',address:'Hosur Road, Bengaluru',lat:12.8452,lng:77.6602},
      {name:'Town Hall',address:'JC Road, Bengaluru',lat:12.9634,lng:77.5855},
      {name:'Freedom Park',address:'Gandhi Nagar, Bengaluru',lat:12.9779,lng:77.5772},
      {name:'KR Market',address:'City Market, Bengaluru',lat:12.9634,lng:77.5774},
      {name:'Vidhana Soudha',address:'Sampangi Rama Nagar, Bengaluru',lat:12.9794,lng:77.5912},
      {name:'Bellandur',address:'ORR East, Bengaluru',lat:12.9259,lng:77.6770},
      {name:'Banaswadi',address:'Bengaluru, Karnataka',lat:13.0095,lng:77.6502},
      {name:'Hebbal Flyover',address:'Ballari Road, Bengaluru',lat:13.0358,lng:77.5970},
      {name:'Yeshwanthpur',address:'Tumkur Road, Bengaluru',lat:13.0280,lng:77.5409},
      {name:'KR Puram',address:'Old Madras Road, Bengaluru',lat:13.0079,lng:77.6776},
      {name:'Banashankari',address:'Bengaluru, Karnataka',lat:12.9255,lng:77.5468}
    ];
  }
  _fallbackPlaces(q){
    const all=this._gazetteer();
    if(!q) return all.slice(0,6);
    const s=q.toLowerCase();
    const hit=all.filter(p=>p.name.toLowerCase().includes(s)||p.address.toLowerCase().includes(s));
    return (hit.length?hit:all).slice(0,6);
  }
  _geocode(query){
    if(!query||!query.trim()) return Promise.resolve(this._fallbackPlaces(''));
    const vb='77.45,13.16,77.80,12.80'; // left,top,right,bottom (Bengaluru bounding box)
    const url='https://nominatim.openstreetmap.org/search?format=json&limit=6'
      +'&countrycodes=in&bounded=1&viewbox='+vb
      +'&q='+encodeURIComponent(query+', Bengaluru, Karnataka');
    return fetch(url,{headers:{Accept:'application/json'}})
      .then(r=>r.json())
      .then(json=>{
        const out=(json||[]).map(p=>({
          name:(p.display_name||'').split(',')[0],
          address:(p.display_name||'').split(',').slice(1,4).join(',').trim(),
          lat:+p.lat, lng:+p.lon
        })).filter(p=>isFinite(p.lat)&&isFinite(p.lng));
        return out.length?out:this._fallbackPlaces(query);
      })
      .catch(()=>this._fallbackPlaces(query));
  }

  componentDidUpdate(prevProps, prevState){
    if(!this._map) return;
    prevState = prevState || {};
    if(prevState.theme !== this.state.theme){
      this._styleReady = false;
      this._map.setStyle(this._mapStyle());
    }
    // NOTE: deliberately NOT recentering on view change — free GIS navigation.
    // Camera only moves on: location pick, Analyze Impact, or "Center Event".
    if(prevState.t!==this.state.t || prevState.selId!==this.state.selId ||
       prevState.view!==this.state.view || prevState.whatIf!==this.state.whatIf ||
       prevState.eventLoc!==this.state.eventLoc || prevState.simRun!==this.state.simRun ||
       prevState.crowd!==this.state.crowd){
      this._updateData(); this._updateMarkers();
    }
    if(prevState.eventLoc!==this.state.eventLoc && this._map){
      this._userInteract=Date.now();
      this._updateEventMarker();
      this._map.flyTo({center:[this.state.eventLoc.lng,this.state.eventLoc.lat],zoom:13.2,pitch:58,bearing:-12,duration:1600,essential:true});
    }
  }

  _mapStyle(){
    // CARTO basemaps — reliable free dark/light raster, pitched for a 3D feel.
    const variant = this.state.theme==='light' ? 'light_all' : 'dark_all';
    return {
      version:8,
      glyphs:'https://fonts.openmaptiles.org/{fontstack}/{range}.pbf',
      sources:{
        carto:{ type:'raster', tileSize:256,
          tiles:['a','b','c','d'].map(s=>`https://${s}.basemaps.cartocdn.com/${variant}/{z}/{x}/{y}@2x.png`),
          attribution:'© OpenStreetMap contributors © CARTO' }
      },
      layers:[
        { id:'bg', type:'background', paint:{'background-color': this.state.theme==='light'?'#e9edf3':'#080B12'} },
        { id:'carto', type:'raster', source:'carto' }
      ]
    };
  }

  _initMap(){
    if(typeof maplibregl==='undefined'){ return setTimeout(()=>this._initMap(),120); }
    const el=document.getElementById('swiftly-map');
    if(!el){ return setTimeout(()=>this._initMap(),120); }
    this._map=new maplibregl.Map({
      container:el, style:this._mapStyle(),
      center:[77.625,12.965], zoom:11.05, pitch:55, bearing:-17,
      antialias:true, attributionControl:false, dragRotate:true
    });
    this._map.addControl(new maplibregl.AttributionControl({compact:true}),'bottom-right');
    this._map.addControl(new maplibregl.NavigationControl({visualizePitch:true}),'bottom-right');
    // Ensure all interactions are on: scroll = zoom, drag = pan, right-drag/ctrl-drag = rotate+tilt
    ['scrollZoom','boxZoom','dragRotate','dragPan','keyboard','doubleClickZoom','touchZoomRotate'].forEach(h=>{ try{ this._map[h].enable(); }catch(e){} });
    this._map.touchZoomRotate.enableRotation();
    // Swallow benign tile-abort errors (fired when the camera moves mid-fetch)
    this._map.on('error',(e)=>{ const msg=e&&e.error&&e.error.message||''; if(/abort|signal|cancel/i.test(msg)) return; });
    const ensure=()=>{
      if(!this._markersAdded){ this._markersAdded=true; try{ this._addMarkers(); }catch(e){} this._startRotate(); }
      const styleOk = this._map.isStyleLoaded && this._map.isStyleLoaded();
      if(!this._styleReady && styleOk){ this._styleReady=true; try{ this._addDataLayers(); }catch(e){} }
      try{ this._updateData(); }catch(e){}
    };
    this._map.on('load',ensure);
    this._map.once('idle',ensure);
    setTimeout(ensure,3500);
    this._map.on('style.load',()=>{ this._styleReady=true; this._addDataLayers(); this._updateData(); });
    ['mousedown','touchstart','wheel'].forEach(ev=>this._map.on(ev,()=>{
      this._userInteract=Date.now();
    }));
  }

  // ----- 3D buildings + corridor / blast / diversion data layers -----
  _firstSymbolId(){
    const layers=this._map.getStyle().layers||[];
    for(const l of layers){ if(l.type==='symbol') return l.id; }
    return undefined;
  }
  _addDataLayers(){
    const m=this._map, light=this.state.theme==='light';
    if(m.getSource('swf-corridors')) return; // already added
    const before=this._firstSymbolId();
    // 3D buildings — only when a vector 'openmaptiles' source is present
    if(m.getSource('openmaptiles') && !m.getLayer('swf-buildings')){
      try{ m.addLayer({id:'swf-buildings',type:'fill-extrusion',source:'openmaptiles','source-layer':'building',minzoom:13,
        paint:{'fill-extrusion-color':light?'#c4cedd':'#16203a',
          'fill-extrusion-height':['coalesce',['get','render_height'],10],
          'fill-extrusion-base':['coalesce',['get','render_min_height'],0],
          'fill-extrusion-opacity':light?0.7:0.82}}, before); }catch(e){}
    }
    // corridors (glow underlay + colored line)
    m.addSource('swf-corridors',{type:'geojson',data:this._corridorGeo()});
    const colorExpr=['match',['get','sev'],'severe','#EF4444','heavy','#F59E0B','moderate','#EAB308','free','#22C55E','#06B6D4'];
    m.addLayer({id:'swf-cor-glow',type:'line',source:'swf-corridors',
      layout:{'line-cap':'round','line-join':'round'},
      paint:{'line-color':colorExpr,'line-width':['interpolate',['linear'],['zoom'],10,9,14,22],
        'line-blur':['interpolate',['linear'],['zoom'],10,4,14,10],'line-opacity':0.34}}, before);
    m.addLayer({id:'swf-cor',type:'line',source:'swf-corridors',
      layout:{'line-cap':'round','line-join':'round'},
      paint:{'line-color':colorExpr,'line-width':['interpolate',['linear'],['zoom'],10,2.2,14,6],'line-opacity':0.95}}, before);
    // affected-corridor highlight (only corridors near the active event)
    m.addLayer({id:'swf-cor-hl',type:'line',source:'swf-corridors',
      filter:['==',['get','aff'],1],
      layout:{'line-cap':'round','line-join':'round'},
      paint:{'line-color':'#ffffff','line-width':['interpolate',['linear'],['zoom'],10,3.4,14,8],
        'line-opacity':0.9,'line-blur':0.4}}, before);
    // blast radius
    m.addSource('swf-blast',{type:'geojson',data:{type:'FeatureCollection',features:[]}});
    m.addLayer({id:'swf-blast-fill',type:'fill',source:'swf-blast',
      paint:{'fill-color':['get','color'],'fill-opacity':['get','op']}}, before);
    m.addLayer({id:'swf-blast-line',type:'line',source:'swf-blast',
      paint:{'line-color':['get','color'],'line-width':1.4,'line-opacity':0.6}}, before);
    // diversion
    m.addSource('swf-div',{type:'geojson',data:{type:'FeatureCollection',features:[]}});
    m.addLayer({id:'swf-div-glow',type:'line',source:'swf-div',
      layout:{'line-cap':'round'},
      paint:{'line-color':'#06B6D4','line-width':10,'line-blur':8,'line-opacity':0.5}}, before);
    m.addLayer({id:'swf-div-line',type:'line',source:'swf-div',
      layout:{'line-cap':'round'},
      paint:{'line-color':'#22d3ee','line-width':4,'line-dasharray':[1.2,1.4],'line-opacity':1}}, before);
  }

  _corridorGeo(){
    // Real corridor anchor points (lat/lng) come from corridor_evitas_summary.csv — we don't
    // have actual road polylines in the dataset, so each corridor is rendered as a short
    // segment radiating from its true centroid toward the city center, colored by its real
    // EVITAS band. This keeps every rendered corridor geographically honest.
    const center={lng:77.5946,lat:12.9716};
    return {type:'FeatureCollection', features:this.CORRIDORS().filter(c=>c.id!=='unknown').map(c=>{
      const dx=c.lng-center.lng, dy=c.lat-center.lat, len=Math.max(0.0001,Math.sqrt(dx*dx+dy*dy));
      const ux=dx/len, uy=dy/len;
      const a=[c.lng-ux*0.018, c.lat-uy*0.018];
      const b=[c.lng+ux*0.022, c.lat+uy*0.022];
      const sev=c.lvl; // severe/heavy/moderate/free, derived from real evitasRaw via _lvl()
      return {type:'Feature',properties:{code:c.code,name:c.name,sev,evitas:c.evitas,id:c.id},
        geometry:{type:'LineString',coordinates:[a,[c.lng,c.lat],b]}};
    })};
  }

  _circle(lng,lat,km,color,op){
    const pts=64, dx=km/(111.320*Math.cos(lat*Math.PI/180)), dy=km/110.574, ring=[];
    for(let i=0;i<=pts;i++){const a=i/pts*2*Math.PI; ring.push([lng+dx*Math.cos(a),lat+dy*Math.sin(a)]);}
    return {type:'Feature',properties:{color,op},geometry:{type:'Polygon',coordinates:[ring]}};
  }

  _updateData(){
    const m=this._map; if(!m) return;
    this._updateEventMarker();          // marker needs no map sources — always update
    if(!this._styleReady) return;       // layer setData needs the style + sources
    const loc=this.state.eventLoc, mult=this.sevMult();
    const ranked=this._affected(loc);
    // Impact blast radius — centered on the REAL event location, scaled by crowd + horizon
    const k = (0.9 + this.state.crowd/14000) * mult;
    let blast={type:'FeatureCollection',features:[
      this._circle(loc.lng,loc.lat,3.4*k,'#EAB308',0.10),
      this._circle(loc.lng,loc.lat,2.1*k,'#F59E0B',0.14),
      this._circle(loc.lng,loc.lat,1.1*k,'#EF4444',0.22)
    ]};
    if(m.getSource('swf-blast')) m.getSource('swf-blast').setData(blast);
    // Highlight corridors near the event (within the blast reach) using real coords
    const reach=Math.max(3.5, 3.4*k);
    const geo=this._corridorGeo();
    geo.features.forEach(f=>{
      const mind=Math.min(...f.geometry.coordinates.map(c=>this._km(loc,{lng:c[0],lat:c[1]})));
      f.properties.aff = mind<=reach ? 1 : 0;
    });
    if(m.getSource('swf-corridors')) m.getSource('swf-corridors').setData(geo);
    // Diversion route — from the event to the nearest lower-risk relief corridor
    let div={type:'FeatureCollection',features:[]};
    const showDiv=this.state.whatIf.diversion||this.state.view==='analysis'||this.state.view==='map';
    const relief=ranked.find(c=>c.dist>1.2 && c.id!=='unknown' && c.id!=='non-corridor' && (c.band==='GREEN'||c.evitasRaw<46))
      || ranked.find(c=>c.id!=='unknown' && c.id!=='non-corridor') || ranked[2] || ranked[1];
    if(showDiv && relief){
      const midLng=(loc.lng+relief.lng)/2 + (relief.lat-loc.lat)*0.18;
      const midLat=(loc.lat+relief.lat)/2 - (relief.lng-loc.lng)*0.18;
      div.features=[{type:'Feature',properties:{},geometry:{type:'LineString',
        coordinates:[[loc.lng,loc.lat],[midLng,midLat],[relief.lng,relief.lat]]}}];
    }
    if(m.getSource('swf-div')) m.getSource('swf-div').setData(div);
    // Event epicentre marker + officers at nearest corridors
    this._updateEventMarker();
  }

  _updateEventMarker(){
    if(!this._map) return;
    const loc=this.state.eventLoc;
    if(!this._eventMarker){
      const el=document.createElement('div');
      el.style.cssText='position:relative;width:0;height:0;';
      el.innerHTML=`
        <div style="position:absolute;left:0;top:0;width:30px;height:30px;transform:translate(-50%,-50%);border-radius:50%;background:radial-gradient(circle,rgba(99,102,241,.55),transparent 68%);"></div>

  // ----- hotspot + deployment HTML markers -----
  _addMarkers(){

  _updateMarkers(){
    if(!this._markers) return;
    const t=this.state.t;
    this.HOTSPOTS().forEach(h=>{
      const mk=this._markers[h.id]; if(!mk) return;
      const visible=h.from<=t;
      mk.getElement().style.display=visible?'block':'none';
      if(visible) mk.getElement().innerHTML=this._markerHTML(h);
    });
    if(this._deploy){
      const show=this.state.view==='deployment';
      Object.values(this._deploy).forEach(el=>el.style.display=show?'block':'none');
    }
  }

  _updateCamera(){
    if(!this._map) return;
    const el=this.state.eventLoc;
    const v=this.state.view;
    const opts={duration:1400,essential:true};
    if(v==='analysis'){ this._map.flyTo({center:[el.lng,el.lat],zoom:13.2,pitch:58,bearing:-12,...opts}); }
    else if(v==='command'){ this._map.flyTo({center:[77.64,12.97],zoom:11.4,pitch:60,bearing:-22,...opts}); }
    else if(v==='deployment'){ this._map.flyTo({center:[77.66,12.97],zoom:11.0,pitch:48,bearing:-10,...opts}); }
    else { this._map.flyTo({center:[77.625,12.965],zoom:11.05,pitch:55,bearing:-17,...opts}); }

    if(!this._map) return;
    this._map.easeTo({bearing:-7, pitch:57, zoom:11.15, duration:5200,

  _onVenueInput(e){

  // Set the active event location → drives recompute + recenter (via componentDidUpdate)
  _setEvent(r){
    if(!(isFinite(r.lng)&&isFinite(r.lat))) return;
    this.setState(s=>({eventLoc:{name:r.name,lng:r.lng,lat:r.lat}, simRun:s.simRun+1}));

  _centerEvent(){

  _replayPrev(){ const n=this.HISTORICAL_EVENTS().length; this.setState(s=>({replayIdx:(s.replayIdx-1+n)%n})); }
  _replayNext(){ const n=this.HISTORICAL_EVENTS().length; this.setState(s=>({replayIdx:(s.replayIdx+1)%n})); }

  // Global search — jumps straight to a matching real corridor (by name or code) and
  // switches into Risk Analysis so the commander sees its EVITAS context immediately.
  _onGlobalSearch(e){
    const q=e.target.value;
    this.setState({globalSearchText:q});
    if(e.key==='Enter' || q.length>2){
      clearTimeout(this._gsT);
      this._gsT=setTimeout(()=>{
        const s=q.toLowerCase();
        const hit=this.CORRIDORS().find(c=>c.name.toLowerCase().includes(s)||c.code.toLowerCase()===s);
        if(hit && s.length>2){ this.setState({selId:hit.id, view:'analysis', activeModule:'risk'}); }
      },450);

  _exportReport(){
    // Lightweight client-side export of the live operational summary as JSON
    try{
      const data={generatedAt:new Date().toISOString(), meta:this.ASTRAM_META(), corridors:this.CORRIDORS()};
      const blob=new Blob([JSON.stringify(data,null,2)],{type:'application/json'});
      const url=URL.createObjectURL(blob);
      const a=document.createElement('a'); a.href=url; a.download='swiftly-operational-summary.json';

  // AI Copilot — every answer is computed from the live insight()/CORRIDORS() state,
  // never generic text. Each chip maps to one grounded operational question.
  _askCopilot(kind){
    const ins=this.insight();
    const ranked=this._affected(this.state.eventLoc);
    const mostVulnerable=[...this.CORRIDORS()].sort((a,b)=>b.evitasRaw-a.evitasRaw)[0];
    let q,a;
    if(kind==='crowd20k'){
      const saved=this.state.crowd;
      this.setState({crowd:20000});
      const proj=this.insight();
      this.setState({crowd:saved});
      q='What happens if crowd size increases to 20,000?';
      a=`Raising attendance to 20,000 lifts the EVITAS-weighted severity score to ~${proj.score} (from ${ins.score} now) and predicted delay to +${proj.delay} min (from +${ins.delay} min). Officer requirement rises from ${ins.officers} to ${proj.officers}, and barricades from ${ins.barricades} to ${proj.barricades}. Recommend pre-positioning the extra ${Math.max(0,proj.officers-ins.officers)} officers at least 45 minutes before doors open.`;
    } else if(kind==='officers'){
      q='How many officers are needed?';
      a=`For the current scenario (${this.state.eventType.toLowerCase()} at ${this.state.eventLoc.name}, ~${this.state.crowd.toLocaleString('en-IN')} attendees), the model recommends ${ins.officers} officers across ${ins.roads} affected corridor${ins.roads>1?'s':''}. This is built from each corridor's Stage-3 ILP baseline (minimum guarantee + risk-proportional surplus from a 30-officer pool) scaled by event size and event-type factor.`;
    } else if(kind==='diversion'){
      const reliefNm=ins.relief?ins.relief.name:'the nearest low-risk corridor';
      q='What diversion is recommended?';
      a=`Route inbound traffic via ${reliefNm}, which sits outside the ${ins.impactKm} km impact radius and carries a lower EVITAS score than the affected set. Activating this diversion is projected to cut delay by roughly 30% relative to no intervention.`;
    } else { // vulnerable
      q='Which corridor is most vulnerable right now?';
      a=`${mostVulnerable.name} carries the highest mean EVITAS score in the dataset at ${mostVulnerable.evitas}/100 (band ${mostVulnerable.band}), drawn from ${mostVulnerable.events.toLocaleString('en-IN')} historical events with a ${Math.round(mostVulnerable.closure*100)}% road-closure rate. It currently has ${mostVulnerable.officers} officer${mostVulnerable.officers===1?'':'s'} assigned under the ILP plan.`;
    }
    this.setState(s=>({copilotTurns:[...s.copilotTurns,{q,a}]}));
  }
  // "Analyze Impact" — geocode whatever is typed, pivot the whole sim to it, jump to Analysis
  _analyze(){
    const q=this.state.srcText;
    const go=(loc)=>{ this._setEvent(loc); this.setState({view:'analysis',activeModule:'risk'}); };
    const cur=this.state.eventLoc;
    if(cur && cur.name && q && q.indexOf(cur.name)===0){ go(cur); return; }
    this._geocode(q).then(rs=>{ if(rs&&rs.length) go(rs[0]); else this.setState({view:'analysis',activeModule:'risk'}); });
  }
  // Haversine distance (km)
  _km(a,b){ const R=6371,dLat=(b.lat-a.lat)*Math.PI/180,dLng=(b.lng-a.lng)*Math.PI/180,
    s=Math.sin(dLat/2)**2+Math.cos(a.lat*Math.PI/180)*Math.cos(b.lat*Math.PI/180)*Math.sin(dLng/2)**2;
    return 2*R*Math.asin(Math.sqrt(s)); }
  // Corridors ranked by proximity to a location
  _affected(loc){ return this.CORRIDORS().map(c=>({...c,dist:this._km(loc,{lng:c.lng,lat:c.lat})}))
    .sort((a,b)=>a.dist-b.dist); }

  }

  _lvl(e){ return e>=80?'severe':e>=60?'heavy':e>=40?'moderate':'free'; } // RED/ORANGE/YELLOW/GREEN bands

  CORRIDORS(){

             causalDelta,riskWeight,minOff,surplusOff,officers,residual,eff,lng,lat]=r;

  HOTSPOTS(){
    // Map markers = the corridors that received officers (ILP-selected), staged onto the timeline by risk rank
    const deployed=this.CORRIDORS().filter(c=>c.officers>0);
    return deployed.map((c,i)=>({id:c.id,name:c.name,lng:c.lng,lat:c.lat,lvl:c.lvl,
      base:34+(c.evitas-38)*1.7, evitas:c.evitas, officers:c.officers,

  }
  EVENT_TYPES(){return['Political Rally','Festival','Sports Event','Construction','VIP Movement','Accident','Public Gathering'];}

  // ---- derived ----
  sevMult(){ return 1 + this.state.t*0.42; }
  activeHotspots(){
    const t=this.state.t;
    return this.HOTSPOTS().filter(h=>h.from<=t);
  }
  selected(){ return this.HOTSPOTS().find(h=>h.id===this.state.selId) || this.HOTSPOTS()[0]; }

  insight(){
    const m=this.sevMult();
    const baseAtt = this.state.crowd;
    const factor = {'Political Rally':1,'Festival':1.18,'Sports Event':1.08,'Construction':.62,'VIP Movement':.55,'Accident':.72,'Public Gathering':.92}[this.state.eventType]||1;
    const ranked = this._affected(this.state.eventLoc);
    // Impact radius (km) grows with crowd magnitude, event type and horizon
    const impactKm = +(( 0.8 + (baseAtt/12000)*2.4 ) * factor * (0.9+0.16*this.state.t)).toFixed(1);
    // Affected corridors = real ASTraM corridors within the impact radius of the venue
    let affected = ranked.filter(c=>c.dist<=impactKm);
    if(affected.length===0) affected=[ranked[0]];
    affected = affected.slice(0,6);
    // proximity-weighted mean EVITAS of the affected set drives the whole prediction
    const wnorm = affected.reduce((a,c)=>a + 1/(0.6+c.dist),0);
    const meanEv = affected.reduce((a,c)=>a + c.evitasRaw/(0.6+c.dist),0)/wnorm;
    let score = Math.min(99, Math.round((meanEv*0.72 + baseAtt/1000*1.05 + affected.length*1.8) * factor * (0.9+0.11*this.state.t)));
    const wi=this.state.whatIf;
    let delay = Math.round((meanEv*0.2 + baseAtt/1300) * factor * m);
    const baseDelay = delay;
    if(wi.officers) delay = Math.round(delay*0.78);
    if(wi.barricades) delay = Math.round(delay*0.85);
    if(wi.diversion) delay = Math.round(delay*0.70);
    const roads = affected.length;
    // Manpower built up from each affected corridor's ILP officer baseline × event scale
    const ilpOff = affected.reduce((a,c)=>a + Math.max(1,c.officers),0);
    const officers = Math.max(2, Math.round(ilpOff*(0.8 + baseAtt/9000)*factor + this.state.t));
    const barricades = Math.max(1, Math.round(affected.reduce((a,c)=>a + c.barricades,0)*0.6 + (baseAtt/14000)*factor + (wi.barricades?1:0) + this.state.closure/45));
    const conf = Math.min(97, 82 + this.state.t*2 + Math.min(7, affected.reduce((a,c)=>a+c.events,0)/380));
    const risk = score>=85?'CRITICAL':score>=68?'HIGH':score>=50?'MODERATE':'LOW';
    const realRanked = ranked.filter(c=>c.id!=='unknown' && c.id!=='non-corridor');
    const relief = realRanked.find(c=>c.dist>impactKm*0.6 && c.evitasRaw<46) || realRanked.find(c=>c.evitasRaw<46) || realRanked[realRanked.length-1] || ranked[ranked.length-1];
    // Recovery estimate (min to clear) — scales with delay, event duration and road-closure %
    const recovery = Math.round(delay * (1.1 + this.state.duration*0.18 + this.state.closure/120) * (wi.diversion?0.82:1));
    return {score,delay,baseDelay,roads,officers,barricades,conf,risk,att:baseAtt,
            impactKm, affected, relief, recovery, nearName:ranked[0].name};
  }

        .map(c=>({title:c.name+' · EVITAS '+c.evitas, detail:c.band+' band · '+c.officers+' officer'+(c.officers===1?'':'s')+' assigned · '+Math.round(c.closure*100)+'% closure rate', color:C[c.lvl]})),
      hasAlerts: this.CORRIDORS().some(c=>c.band==='RED'||c.band==='ORANGE'),
      alertCount: this.CORRIDORS().filter(c=>c.band==='RED'||c.band==='ORANGE').length,
      mapplsStatusLabel: this.state.mapplsStatus==='live'?'LIVE':this.state.mapplsStatus==='connecting'?'LINK…':'STANDBY',
      // Mappls base-layer status chip
      mapplsStatus:this.state.mapplsStatus,
      mapplsLabel: this.state.mapplsStatus==='live'?'Search API · Live':this.state.mapplsStatus==='connecting'?'Linking…':'Search API · Standby',
      mapplsDot: this.state.mapplsStatus==='live'?'var(--success)':this.state.mapplsStatus==='connecting'?'var(--amber)':'var(--secondary)',

      // ===== RESOURCE ALLOCATION MODULE — real ILP ledger =====
      resTotal: this.TOTAL_OFFICERS(),
      resAssigned: this.TOTAL_OFFICERS(),
      resReserve: Math.max(0, 30 - this.TOTAL_OFFICERS()), // TOTAL_OFFICERS config = 30
      resUtilStr: Math.round(this.TOTAL_OFFICERS()/30*100)+'%',
      resBarricadeZones: this.CORRIDORS().filter(c=>c.barricades>0).length,
      shortfalls: this.CORRIDORS().filter(c=>c.officers>0)
        .map(c=>({name:c.name, officers:c.officers, plural:c.officers>1?'s':'',
          residual:c.residual.toFixed(1),
          band:c.band, color:bandColor[c.band]||'var(--amber)', _sort:c.residual}))
        .sort((a,b)=>a._sort-b._sort).slice(0,5),
      allocationRows: this.CORRIDORS().map(c=>{
        const tot=Math.max(1,c.minOfficers+c.surplusOfficers);
        return {name:c.name, band:c.band, color:bandColor[c.band]||'var(--success)',
          minOfficers:c.minOfficers, surplusOfficers:c.surplusOfficers, officers:c.officers,
          minPct:Math.round(c.minOfficers/tot*100)+'%', surPct:Math.round(c.surplusOfficers/tot*100)+'%'};
      }).sort((a,b)=>b.officers-a.officers),

      // ===== HISTORICAL REPLAY MODULE — steps through real logged ASTraM events =====
      replayDateRange: this.ASTRAM_META().dateRange,
      replayTotal: this.ASTRAM_META().totalEvents.toLocaleString('en-IN'),
      replayIndexStr: (this.state.replayIdx+1)+' / '+this.HISTORICAL_EVENTS().length,
      replayPrev:()=>this._replayPrev(), replayNext:()=>this._replayNext(),
      replayEvent: (()=>{
        const ev=this.HISTORICAL_EVENTS()[this.state.replayIdx];
        const planned=ev.type==='planned';
        return {...ev,
          typeLabel: planned?'PLANNED':'UNPLANNED',
          typeBg: planned?'rgba(99,102,241,.16)':'rgba(245,158,11,.16)',
          typeColor: planned?'var(--primary)':'var(--warning)',
          closureNote: ev.closure?' · Road closure required':''};
      })(),
      replayList: this.HISTORICAL_EVENTS().map((e,i)=>({label:e.label,
        dot: e.type==='planned'?'var(--primary)':'var(--warning)',
        bg: i===this.state.replayIdx?'var(--glass2)':'transparent',
        brd: i===this.state.replayIdx?'var(--secondary)':'var(--glassbrd)',
        onClick:()=>this._replayGoto(i)})),
      replayCorridor: (()=>{
        const ev=this.HISTORICAL_EVENTS()[this.state.replayIdx];
        const c=this.CORRIDORS().find(x=>x.name===ev.corridor) || this.CORRIDORS()[0];
        return {name:c.name, evitas:c.evitas, color:C[c.lvl],
          closurePct:Math.round(c.closure*100)+'%', officers:c.officers, events:c.events,
          red:c.red, orange:c.orange};
      })(),

      // ===== REPORTS MODULE — executive analytics, real dataset + pipeline numbers =====
      exportReport:()=>this._exportReport(),
      reportKpis: [
        {label:'Total Events',value:this.ASTRAM_META().totalEvents.toLocaleString('en-IN'),sub:this.ASTRAM_META().dateRange,color:'var(--text)'},
        {label:'Planned',value:this.ASTRAM_META().plannedEvents.toLocaleString('en-IN'),sub:Math.round(this.ASTRAM_META().plannedEvents/this.ASTRAM_META().totalEvents*1000)/10+'% of total',color:'var(--primary)'},
        {label:'Unplanned',value:this.ASTRAM_META().unplannedEvents.toLocaleString('en-IN'),sub:Math.round(this.ASTRAM_META().unplannedEvents/this.ASTRAM_META().totalEvents*1000)/10+'% of total',color:'var(--warning)'},
        {label:'Road Closures',value:this.ASTRAM_META().roadClosures.toLocaleString('en-IN'),sub:'events requiring closure',color:'var(--critical)'},
        {label:'Officers Deployed',value:String(this.TOTAL_OFFICERS()),sub:'across '+this.CORRIDORS().filter(c=>c.officers>0).length+' corridors (ILP)',color:'var(--success)'}
      ],
      causeBars: (()=>{
        const causes=this.ASTRAM_META().causes;
        const max=causes[0].count;
        return causes.map(c=>({label:c.label, count:c.count.toLocaleString('en-IN'), pct:Math.round(c.count/max*100)+'%'}));
      })(),
      reportCorridors: [...this.CORRIDORS()].sort((a,b)=>b.evitas-a.evitas).slice(0,6)
        .map(c=>({name:c.name, evitas:c.evitas, color:C[c.lvl], officers:c.officers})),
      effectivenessCards: this.CORRIDORS().filter(c=>c.eff>0).sort((a,b)=>b.eff-a.eff).slice(0,4)
        .map(c=>({name:c.name, eff:Math.round(c.eff*100)+'%'}))
    };
  }

  _togglePlay(){
    if(this.state.playing){ clearInterval(this._play); this.setState({playing:false}); return; }
    this.setState({playing:true});
    this._play=setInterval(()=>{
      this.setState(s=>{ const nt=(s.t+1)%4; return {t:nt}; });
    },1600);
  }
}
</script>

<script>
(function(){
  function boot(){
    var tplEl = document.getElementById('swiftly-template');
    var templateHtml = tplEl.textContent;
    var mountEl = document.getElementById('swiftly-root');
    var instance = new Component({});
    DCRuntime.mount(templateHtml, mountEl, instance);
    instance._mount();
  }
  if(document.readyState === 'loading'){
    document.addEventListener('DOMContentLoaded', boot);
  } else {
    boot();
  }
})();
</script>
<script>
/* SWIFTLY enhancements: real data + real AI copilot + BTP badge */
(function(){
  // 1) Load datasets
  window.SWIFTLY_DATA = { ready:false };
  Promise.all([
    fetch('/data/corridors.json').then(r=>r.json()).catch(()=>[]),
    fetch('/data/events.json').then(r=>r.json()).catch(()=>({})),
    fetch('/data/counterfactuals.json').then(r=>r.json()).catch(()=>[])
  ]).then(([corridors, events, cf])=>{
    window.SWIFTLY_DATA = { ready:true, corridors, events, counterfactuals: cf };
    window.dispatchEvent(new CustomEvent('swiftly-data-ready'));
    console.log('[Swiftly] data loaded:',
      corridors.length,'corridors,',
      events.total,'historical events,',
      cf.length,'counterfactuals');
  });

  // 2) Add Bengaluru Traffic Police + feed status badges to top bar (DOM injection)
  function injectBadges(){
    var bar = document.querySelector('[data-swiftly-topbar]') ||
              document.querySelector('header') ||
              document.body.firstElementChild;
    if(!bar || bar.querySelector('.swf-btp-badge')) return;
    var badge = document.createElement('div');
    badge.className='swf-btp-badge';
    badge.style.cssText='position:fixed;top:14px;left:50%;transform:translateX(-50%);z-index:2147483646;display:flex;gap:8px;align-items:center;padding:6px 12px;border-radius:10px;background:rgba(13,19,31,.78);backdrop-filter:blur(14px);border:1px solid rgba(124,142,200,.18);font:600 10.5px Inter,system-ui;color:#E7ECF5;letter-spacing:.04em;pointer-events:none;';
    badge.innerHTML = '<span style="width:18px;height:18px;border-radius:50%;background:linear-gradient(135deg,#F59E0B,#EF4444);display:inline-flex;align-items:center;justify-content:center;font-size:9px;font-weight:800;">BTP</span>'+
      '<span style="color:#E7ECF5;">BENGALURU TRAFFIC POLICE</span>'+
      '<span style="width:1px;height:12px;background:rgba(255,255,255,.12);"></span>'+
      '<span style="display:flex;align-items:center;gap:5px;color:#8a96ac;"><span class="swf-dot" style="width:6px;height:6px;border-radius:50%;background:#22C55E;box-shadow:0 0 6px #22C55E;animation:swfPulse 2s infinite;"></span>ASTraM</span>'+
      '<span style="display:flex;align-items:center;gap:5px;color:#8a96ac;"><span class="swf-dot" style="width:6px;height:6px;border-radius:50%;background:#06B6D4;box-shadow:0 0 6px #06B6D4;animation:swfPulse 2s infinite .5s;"></span>MapMyIndia</span>';
    var style = document.createElement('style');
    style.textContent='@keyframes swfPulse{0%,100%{opacity:1}50%{opacity:.45}}';
    document.head.appendChild(style);
    document.body.appendChild(badge);
  }
  if(document.readyState!=='loading') injectBadges(); else document.addEventListener('DOMContentLoaded', injectBadges);

  // 3) Real AI Copilot — intercept questions, route to /api/copilot
  // The standalone uses _askCopilot(kind) with preset chips. We add a free-text input + send to LLM.
  function buildContext(){
    var d = window.SWIFTLY_DATA;
    if(!d || !d.ready) return 'Datasets still loading.';
    var topRisk = (d.corridors||[]).slice(0,5).map(function(c){
      return c.corridor_name+' (rank '+c.risk_rank+', score '+(+c.risk_score).toFixed(2)+', '+c.event_count+' events)';
    }).join('; ');
    var totals = d.events||{};
    var topCauses = Object.entries(totals.by_cause||{}).slice(0,5)
      .map(function(p){return p[0]+':'+p[1]}).join(', ');
    return [
      'SWIFTLY — Bengaluru Traffic Intelligence Platform.',
      'Total historical ASTraM events analyzed: '+(totals.total||'n/a')+'.',
      'Top 5 corridors by EVITAS risk: '+topRisk+'.',
      'Top event causes: '+topCauses+'.',
      'Use this data when answering. Be concise (2-4 sentences). Recommend officers, barricades, diversions when asked.'
    ].join(' ');
  }
  window.SWIFTLY_askLLM = async function(question){
    var ctx = buildContext();
    try{
      var res = await fetch('/api/copilot', {
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body: JSON.stringify({ question: question, context: ctx })
      });
      if(!res.ok){
        var t = await res.text();
        return 'Copilot error: '+res.status+' '+t.slice(0,200);
      }
      var j = await res.json();
      return j.answer || '(no response)';
    }catch(e){ return 'Copilot offline: '+e.message; }
  };

  // 4) Inject a free-text input + send button into the copilot panel whenever it opens
  function ensureCopilotInput(){
    var panels = document.querySelectorAll('[class*="copilot"], [data-copilot], div');
    // Heuristic: find a visible panel containing the chip "What if crowd"
    var panel=null;
    document.querySelectorAll('button').forEach(function(b){
      if(b.textContent && b.textContent.indexOf('crowd')>=0 && b.offsetParent){
        var p=b.closest('div'); while(p && p.parentElement && p.scrollHeight<200){ p=p.parentElement; }
        if(p) panel=p;
      }
    });
    if(!panel || panel.querySelector('.swf-copilot-input')) return;
    var wrap=document.createElement('div');
    wrap.className='swf-copilot-input';
    wrap.style.cssText='display:flex;gap:6px;margin-top:10px;padding-top:10px;border-top:1px solid rgba(124,142,200,.16);';
    wrap.innerHTML='<input type="text" placeholder="Ask Swiftly Copilot anything..." style="flex:1;background:rgba(17,24,39,.6);border:1px solid rgba(124,142,200,.2);color:#E7ECF5;padding:8px 10px;border-radius:7px;font:500 12px Inter,system-ui;outline:none;">'+
      '<button style="padding:8px 12px;border:0;border-radius:7px;background:linear-gradient(135deg,#6366F1,#06B6D4);color:#fff;font:700 11px Inter,system-ui;cursor:pointer;">Send</button>'+
      '<div class="swf-answer" style="display:none;width:100%;margin-top:8px;padding:10px 12px;border-radius:8px;background:rgba(99,102,241,.08);border:1px solid rgba(99,102,241,.22);color:#E7ECF5;font:400 12px/1.55 Inter,system-ui;white-space:pre-wrap;"></div>';
    panel.appendChild(wrap);
    var input=wrap.querySelector('input'), btn=wrap.querySelector('button'), out=wrap.querySelector('.swf-answer');
    async function ask(){
      var q=input.value.trim(); if(!q) return;
      out.style.display='block'; out.textContent='Thinking…';
      btn.disabled=true;
      out.textContent = await window.SWIFTLY_askLLM(q);
      btn.disabled=false;
    }
    btn.addEventListener('click', ask);
    input.addEventListener('keydown', function(e){ if(e.key==='Enter') ask(); });
  }
  setInterval(ensureCopilotInput, 800);
})();
</script>
</body>
