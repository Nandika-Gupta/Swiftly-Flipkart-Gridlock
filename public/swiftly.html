  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

  </script>

cal);margin-left:8px\"><\u002Fspan>Severe\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"position:relative;height:30px;\">\n        <div style=\"position:absolute;left:0;right:0;top:13px;height:4px;border-radius:3px;background:linear-gradient(90deg,var(--success),var(--amber),var(--warning),var(--critical));opacity:.5;\"><\u002Fdiv>\n        <div style=\"position:absolute;left:0;top:13px;height:4px;border-radius:3px;width:{{ tPct }};background:linear-gradient(90deg,var(--primary),var(--secondary));box-shadow:0 0 10px var(--secondary);transition:width .4s;\"><\u002Fdiv>\n        <sc-for list=\"{{ tStops }}\" as=\"s\" hint-placeholder-count=\"4\">\n          <button onclick=\"{{ s.onClick }}\" style=\"position:absolute;left:{{ s.pos }};top:0;transform:translateX(-50%);display:flex;flex-direction:column;align-items:center;gap:5px;border:none;background:none;cursor:pointer;\">\n            <span style=\"width:{{ s.size }};height:{{ s.size }};border-radius:50%;background:{{ s.fill }};border:2px solid {{ s.brd }};box-shadow:{{ s.glow }};transition:all .3s;\"><\u002Fspan>\n            <span style=\"font-size:10px;font-weight:700;font-family:'JetBrains Mono',monospace;color:{{ s.fg }};\">{{ s.label }}<\u002Fspan>\n          <\u002Fbutton>\n        <\u002Fsc-for>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsc-if>\n\n  <!-- map credit -->\n  <div style=\"position:absolute;left:112px;bottom:22px;z-index:30;display:flex;align-items:center;gap:10px;padding:7px 12px;border-radius:9px;background:var(--glass);backdrop-filter:blur(12px);border:1px solid var(--glassbrd);font-size:10px;color:var(--dim);font-weight:600;\">\n    <span style=\"display:flex;align-items:center;gap:7px;\">\n      <svg width=\"13\" height=\"13\" viewBox=\"0 0 24 24\" fill=\"none\"><circle cx=\"12\" cy=\"10\" r=\"3\" fill=\"var(--secondary)\"><\u002Fcircle><path d=\"M12 2C7.6 2 4 5.6 4 10c0 5.5 8 12 8 12s8-6.5 8-12c0-4.4-3.6-8-8-8z\" stroke=\"var(--secondary)\" stroke-width=\"1.6\"><\u002Fpath><\u002Fsvg>\n      Powered by <b style=\"color:var(--text)\">MapmyIndia · Mappls<\u002Fb>\n    <\u002Fspan>\n    <span style=\"width:1px;height:14px;background:var(--glassbrd);\"><\u002Fspan>\n    <span style=\"display:flex;align-items:center;gap:6px;\">\n      <span style=\"width:6px;height:6px;border-radius:50%;background:{{ mapplsDot }};box-shadow:0 0 8px {{ mapplsDot }};\"><\u002Fspan>\n      <span style=\"font-family:'JetBrains Mono',monospace;font-size:9.5px;font-weight:700;letter-spacing:.02em;\">{{ mapplsLabel }}<\u002Fspan>\n    <\u002Fspan>\n  <\u002Fdiv>\n\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{&quot;$preview&quot;:{&quot;width&quot;:&quot;100%&quot;,&quot;height&quot;:&quot;100%&quot;}}\">\nclass Component extends DCLogic {\n  state = {\n    theme:'dark', view:'map', t:0, playing:false, activeModule:'overview', copilotOpen:false,\n    duration:3, closure:20,\n    selId:'varthur-road', eventType:'Political Rally',\n    crowd:12000, whatIf:{officers:false,barricades:false,diversion:false},\n    clock:'',\n    srcText:'MG Road, Bengaluru', srcOpen:false, srcResults:[],\n    venueText:'Sree Kanteerava Stadium', venueOpen:false, venueResults:[],\n    eventLoc:{name:'Sree Kanteerava Stadium',lng:77.5959,lat:12.9698}, simRun:0,\n    mapplsStatus:'connecting', routeInfo:null\n  };\n\n  componentDidMount(){\n    this._tick();\n    this._clk = setInterval(()=>this._tick(), 1000);\n    // Swallow benign AbortError tile-fetch rejections from map camera moves\n    this._rej = (ev)=>{ const r=ev&&ev.reason; const n=r&&(r.name||r.message)||''; if(/abort/i.test(n)){ ev.preventDefault(); } };\n    window.addEventListener('unhandledrejection', this._rej);\n    // Real MapmyIndia (Mappls) integration — see mappls-service.js\n    import('./mappls-service.js').then(m=>{\n      this._mappls = m;\n      // attempt a live token; on a whitelisted domain this confirms the link.\n      // Race against a timeout so a hung CORS preflight resolves to standby.\n      const timeout = new Promise((_,rej)=>setTimeout(()=>rej(new Error('timeout')),3500));\n      Promise.race([m.getToken(), timeout])\n        .then(()=>this.setState({mapplsStatus:'live'}))\n        .catch(()=>this.setState({mapplsStatus:'standby'}));\n    }).catch(()=>this.setState({mapplsStatus:'standby'}));\n    // Real interactive base map — MapLibre GL + OpenFreeMap vector tiles\n    this._initMap();\n  }\n\n  componentDidUpdate(prevProps, prevState){\n    if(!this._map) return;\n    prevState = prevState || {};\n    if(prevState.theme !== this.state.theme){\n      this._styleReady = false;\n      this._map.setStyle(this._mapStyle());\n    }\n    // NOTE: deliberately NOT recentering on view change — free GIS navigation.\n    // Camera only moves on: location pick, Analyze Impact, or \"Center Event\".\n    if(prevState.t!==this.state.t || prevState.selId!==this.state.selId ||\n       prevState.view!==this.state.view || prevState.whatIf!==this.state.whatIf ||\n       prevState.eventLoc!==this.state.eventLoc || prevState.simRun!==this.state.simRun ||\n       prevState.crowd!==this.state.crowd){\n      this._updateData(); this._updateMarkers();\n    }\n    if(prevState.eventLoc!==this.state.eventLoc && this._map){\n      this._userInteract=Date.now();\n      this._updateEventMarker();\n      this._map.flyTo({center:[this.state.eventLoc.lng,this.state.eventLoc.lat],zoom:13.2,pitch:58,bearing:-12,duration:1600,essential:true});\n    }\n  }\n\n  _mapStyle(){\n    // CARTO basemaps — reliable free dark/light raster, pitched for a 3D feel.\n    const variant = this.state.theme==='light' ? 'light_all' : 'dark_all';\n    return {\n      version:8,\n      glyphs:'https://fonts.openmaptiles.org/{fontstack}/{range}.pbf',\n      sources:{\n        carto:{ type:'raster', tileSize:256,\n          tiles:['a','b','c','d'].map(s=>`https://${s}.basemaps.cartocdn.com/${variant}/{z}/{x}/{y}@2x.png`),\n          attribution:'© OpenStreetMap contributors © CARTO' }\n      },\n      layers:[\n        { id:'bg', type:'background', paint:{'background-color': this.state.theme==='light'?'#e9edf3':'#080B12'} },\n        { id:'carto', type:'raster', source:'carto' }\n      ]\n    };\n  }\n\n  _initMap(){\n    if(typeof maplibregl==='undefined'){ return setTimeout(()=>this._initMap(),120); }\n    const el=document.getElementById('swiftly-map');\n    if(!el){ return setTimeout(()=>this._initMap(),120); }\n    this._map=new maplibregl.Map({\n      container:el, style:this._mapStyle(),\n      center:[77.625,12.965], zoom:11.05, pitch:55, bearing:-17,\n      antialias:true, attributionControl:false, dragRotate:true\n    });\n    this._map.addControl(new maplibregl.AttributionControl({compact:true}),'bottom-right');\n    this._map.addControl(new maplibregl.NavigationControl({visualizePitch:true}),'bottom-right');\n    // Ensure all interactions are on: scroll = zoom, drag = pan, right-drag/ctrl-drag = rotate+tilt\n    ['scrollZoom','boxZoom','dragRotate','dragPan','keyboard','doubleClickZoom','touchZoomRotate'].forEach(h=>{ try{ this._map[h].enable(); }catch(e){} });\n    this._map.touchZoomRotate.enableRotation();\n    // Swallow benign tile-abort errors (fired when the camera moves mid-fetch)\n    this._map.on('error',(e)=>{ const msg=e&&e.error&&e.error.message||''; if(/abort|signal|cancel/i.test(msg)) return; });\n    const ensure=()=>{\n      if(!this._markersAdded){ this._markersAdded=true; try{ this._addMarkers(); }catch(e){} this._startRotate(); }\n      const styleOk = this._map.isStyleLoaded && this._map.isStyleLoaded();\n      if(!this._styleReady && styleOk){ this._styleReady=true; try{ this._addDataLayers(); }catch(e){} }\n      try{ this._updateData(); }catch(e){}\n    };\n    this._map.on('load',ensure);\n    this._map.once('idle',ensure);\n    setTimeout(ensure,3500);\n    this._map.on('style.load',()=>{ this._styleReady=true; this._addDataLayers(); this._updateData(); });\n    ['mousedown','touchstart','wheel'].forEach(ev=>this._map.on(ev,()=>{\n      this._userInteract=Date.now();\n    }));\n  }\n\n  // ----- 3D buildings + corridor / blast / diversion data layers -----\n  _firstSymbolId(){\n    const layers=this._map.getStyle().layers||[];\n    for(const l of layers){ if(l.type==='symbol') return l.id; }\n    return undefined;\n  }\n  _addDataLayers(){\n    const m=this._map, light=this.state.theme==='light';\n    if(m.getSource('swf-corridors')) return; // already added\n    const before=this._firstSymbolId();\n    // 3D buildings — only when a vector 'openmaptiles' source is present\n    if(m.getSource('openmaptiles') && !m.getLayer('swf-buildings')){\n      try{ m.addLayer({id:'swf-buildings',type:'fill-extrusion',source:'openmaptiles','source-layer':'building',minzoom:13,\n        paint:{'fill-extrusion-color':light?'#c4cedd':'#16203a',\n          'fill-extrusion-height':['coalesce',['get','render_height'],10],\n          'fill-extrusion-base':['coalesce',['get','render_min_height'],0],\n          'fill-extrusion-opacity':light?0.7:0.82}}, before); }catch(e){}\n    }\n    // corridors (glow underlay + colored line)\n    m.addSource('swf-corridors',{type:'geojson',data:this._corridorGeo()});\n    const colorExpr=['match',['get','sev'],'severe','#EF4444','heavy','#F59E0B','moderate','#EAB308','free','#22C55E','#06B6D4'];\n    m.addLayer({id:'swf-cor-glow',type:'line',source:'swf-corridors',\n      layout:{'line-cap':'round','line-join':'round'},\n      paint:{'line-color':colorExpr,'line-width':['interpolate',['linear'],['zoom'],10,9,14,22],\n        'line-blur':['interpolate',['linear'],['zoom'],10,4,14,10],'line-opacity':0.34}}, before);\n    m.addLayer({id:'swf-cor',type:'line',source:'swf-corridors',\n      layout:{'line-cap':'round','line-join':'round'},\n      paint:{'line-color':colorExpr,'line-width':['interpolate',['linear'],['zoom'],10,2.2,14,6],'line-opacity':0.95}}, before);\n    // affected-corridor highlight (only corridors near the active event)\n    m.addLayer({id:'swf-cor-hl',type:'line',source:'swf-corridors',\n      filter:['==',['get','aff'],1],\n      layout:{'line-cap':'round','line-join':'round'},\n      paint:{'line-color':'#ffffff','line-width':['interpolate',['linear'],['zoom'],10,3.4,14,8],\n        'line-opacity':0.9,'line-blur':0.4}}, before);\n    // blast radius\n    m.addSource('swf-blast',{type:'geojson',data:{type:'FeatureCollection',features:[]}});\n    m.addLayer({id:'swf-blast-fill',type:'fill',source:'swf-blast',\n      paint:{'fill-color':['get','color'],'fill-opacity':['get','op']}}, before);\n    m.addLayer({id:'swf-blast-line',type:'line',source:'swf-blast',\n      paint:{'line-color':['get','color'],'line-width':1.4,'line-opacity':0.6}}, before);\n    // diversion\n    m.addSource('swf-div',{type:'geojson',data:{type:'FeatureCollection',features:[]}});\n    m.addLayer({id:'swf-div-glow',type:'line',source:'swf-div',\n      layout:{'line-cap':'round'},\n      paint:{'line-color':'#06B6D4','line-width':10,'line-blur':8,'line-opacity':0.5}}, before);\n    m.addLayer({id:'swf-div-line',type:'line',source:'swf-div',\n      layout:{'line-cap':'round'},\n      paint:{'line-color':'#22d3ee','line-width':4,'line-dasharray':[1.2,1.4],'line-opacity':1}}, before);\n  }\n\n  _corridorGeo(){\n    const C=[\n      ['ORR-E','severe',[[77.6225,12.9166],[77.667,12.935],[77.7011,12.9568],[77.685,12.985],[77.6776,13.0079]]],\n      ['HSR','severe',[[77.6225,12.9166],[77.643,12.895],[77.655,12.87],[77.6602,12.8452]]],\n      ['WHF','severe',[[77.7011,12.9568],[77.726,12.962],[77.7500,12.9698]]],\n      ['OMR','heavy',[[77.612,12.985],[77.642,12.996],[77.6776,13.0079]]],\n      ['BLR','heavy',[[77.5946,12.9716],[77.594,13.001],[77.5970,13.0358],[77.604,13.08],[77.61,13.13]]],\n      ['TUM','moderate',[[77.5946,12.9716],[77.566,12.992],[77.5409,13.0280],[77.512,13.062]]],\n      ['MYS','free',[[77.5946,12.9716],[77.552,12.955],[77.503,12.945],[77.462,12.94]]],\n      ['BGR','moderate',[[77.5946,12.9716],[77.601,12.92],[77.6070,12.87],[77.612,12.835]]],\n      ['ORR-W','heavy',[[77.6776,13.0079],[77.71,12.985],[77.72,12.945],[77.7011,12.9568],[77.685,12.905],[77.645,12.885],[77.6225,12.9166],[77.582,12.918],[77.552,12.952],[77.553,12.995],[77.575,13.028],[77.616,13.045],[77.652,13.032],[77.6776,13.0079]]]\n    ];\n    return {type:'FeatureCollection',features:C.map(([code,sev,coords])=>(\n      {type:'Feature',properties:{code,sev},geometry:{type:'LineString',coordinates:coords}}))};\n  }\n\n  _circle(lng,lat,km,color,op){\n    const pts=64, dx=km/(111.320*Math.cos(lat*Math.PI/180)), dy=km/110.574, ring=[];\n    for(let i=0;i<=pts;i++){const a=i/pts*2*Math.PI; ring.push([lng+dx*Math.cos(a),lat+dy*Math.sin(a)]);}\n    return {type:'Feature',properties:{color,op},geometry:{type:'Polygon',coordinates:[ring]}};\n  }\n\n  _updateData(){\n    const m=this._map; if(!m) return;\n    this._updateEventMarker();          // marker needs no map sources — always update\n    if(!this._styleReady) return;       // layer setData needs the style + sources\n    const loc=this.state.eventLoc, mult=this.sevMult();\n    const ranked=this._affected(loc);\n    // Impact blast radius — centered on the REAL event location, scaled by crowd + horizon\n    const k = (0.9 + this.state.crowd/14000) * mult;\n    let blast={type:'FeatureCollection',features:[\n      this._circle(loc.lng,loc.lat,3.4*k,'#EAB308',0.10),\n      this._circle(loc.lng,loc.lat,2.1*k,'#F59E0B',0.14),\n      this._circle(loc.lng,loc.lat,1.1*k,'#EF4444',0.22)\n    ]};\n    if(m.getSource('swf-blast')) m.getSource('swf-blast').setData(blast);\n    // Highlight corridors near the event (within the blast reach) using real coords\n    const reach=Math.max(3.5, 3.4*k);\n    const geo=this._corridorGeo();\n    geo.features.forEach(f=>{\n      const mind=Math.min(...f.geometry.coordinates.map(c=>this._km(loc,{lng:c[0],lat:c[1]})));\n      f.properties.aff = mind<=reach ? 1 : 0;\n    });\n    if(m.getSource('swf-corridors')) m.getSource('swf-corridors').setData(geo);\n    // Diversion route — from the event to the nearest lower-risk relief corridor\n    let div={type:'FeatureCollection',features:[]};\n    const showDiv=this.state.whatIf.diversion||this.state.view==='analysis'||this.state.view==='map';\n    const relief=ranked.find(c=>c.dist>1.2 && (c.band==='GREEN'||c.evitasRaw<46)) || ranked[2] || ranked[1];\n    if(showDiv && relief){\n      const midLng=(loc.lng+relief.lng)/2 + (relief.lat-loc.lat)*0.18;\n      const midLat=(loc.lat+relief.lat)/2 - (relief.lng-loc.lng)*0.18;\n      div.features=[{type:'Feature',properties:{},geometry:{type:'LineString',\n        coordinates:[[loc.lng,loc.lat],[midLng,midLat],[relief.lng,relief.lat]]}}];\n    }\n    if(m.getSource('swf-div')) m.getSource('swf-div').setData(div);\n    // Event epicentre marker + officers at nearest corridors\n    this._updateEventMarker();\n  }\n\n  _updateEventMarker(){\n    if(!this._map) return;\n    const loc=this.state.eventLoc;\n    if(!this._eventMarker){\n      const el=document.createElement('div');\n      el.style.cssText='position:relative;width:0;height:0;';\n      el.innerHTML=`\n        <div style=\"position:absolute;left:0;top:0;width:30px;height:30px;transform:translate(-50%,-50%);border-radius:50%;background:radial-gradient(circle,rgba(99,102,241,.55),transparent 68%);\"><\u002Fdiv>\n        <div style=\"position:absolute;left:0;top:0;width:22px;height:22px;transform:translate(-50%,-50%);border-radius:50%;border:2px solid #6366F1;animation:pulseRing 2.4s ease-out infinite;\"><\u002Fdiv>\n        <div style=\"position:absolute;left:0;top:0;width:13px;height:13px;transform:translate(-50%,-50%);border-radius:50%;background:#6366F1;box-shadow:0 0 16px 5px rgba(99,102,241,.7);border:2px solid #fff;\"><\u002Fdiv>\n        <div class=\"evt-lbl\" style=\"position:absolute;left:0;bottom:11px;transform:translateX(-50%);display:flex;align-items:center;gap:6px;padding:4px 9px;border-radius:7px;background:#111827;border:1px solid #6366F1;box-shadow:0 6px 18px rgba(0,0,0,.6);white-space:nowrap;\">\n          <span style=\"font-size:8px;font-weight:800;letter-spacing:.12em;color:#a5b4fc;\">EVENT<\u002Fspan>\n          <span class=\"evt-name\" style=\"font-size:10.5px;font-weight:700;color:#E7ECF5;font-family:Inter,sans-serif;\"><\u002Fspan>\n        <\u002Fdiv>`;\n      this._eventMarker=new maplibregl.Marker({element:el,anchor:'center'}).setLngLat([loc.lng,loc.lat]).addTo(this._map);\n    }\n    this._eventMarker.setLngLat([loc.lng,loc.lat]);\n    const nm=this._eventMarker.getElement().querySelector('.evt-name');\n    if(nm) nm.textContent=loc.name;\n  }\n\n  // ----- hotspot + deployment HTML markers -----\n  _addMarkers(){\n    if(!this._map) return;\n    this._markers={};\n    this.HOTSPOTS().forEach(h=>{\n      const el=document.createElement('div');\n      el.style.cssText='position:relative;cursor:pointer;width:0;height:0;';\n      el.innerHTML=this._markerHTML(h);\n      el.addEventListener('click',(ev)=>{ev.stopPropagation(); this.setState({selId:h.id});});\n      const mk=new maplibregl.Marker({element:el,anchor:'center'}).setLngLat([h.lng,h.lat]).addTo(this._map);\n      this._markers[h.id]=mk;\n    });\n    // deployment markers — built from the real ILP plan (corridors with officers > 0)\n    this._deploy={};\n    this.CORRIDORS().filter(c=>c.officers>0).forEach(c=>{\n      if(c.lng==null||c.lat==null) return;\n      // barricade (▲) where road-closure pressure is high (ORANGE/RED band or barricades>=2); else officer (P)\n      const barricade = c.band==='ORANGE' || c.band==='RED' || c.barricades>=2;\n      const o=!barricade;\n      const el=document.createElement('div');\n      el.style.cssText='display:none;transform:translateY(-30px);';\n      el.innerHTML=`<div style=\"display:flex;flex-direction:column;align-items:center;gap:3px;font-family:Inter,sans-serif;\">\n        <div style=\"width:26px;height:26px;border-radius:8px 8px 8px 2px;background:${o?'rgba(99,102,241,.95 on:absolute;left:0;bottom:9px;transform:translateX(-50%);display:flex;align-items:center;gap:6px;padding:4px 8px;border-radius:7px;background:${sel?'var(--surface)':'var(--glass)'};backdrop-filter:blur(8px);border:1px solid ${sel?col:'var(--glassbrd)'};box-shadow:0 6px 18px rgba(0,0,0,.5);white-space:nowrap;scale:${sel?1.12:1};\">\n        <span style=\"width:6px;height:6px;border-radius:50%;background:${col};box-shadow:0 0 8px ${col};\"><\u002Fspan>\n        <span style=\"font-size:10.5px;font-weight:700;color:var(--text);font-family:Inter,sans-serif;\">${h.name}<\u002Fspan>\n        <span style=\"font-family:'JetBrains Mono',monospace;font-size:10px;font-weight:700;color:${col};\">${h.evitas}<\u002Fspan>\n      <\u002Fdiv>`;\n  }\n\n  _updateMarkers(){\n    if(!this._markers) return;\n    const t=this.state.t;\n    this.HOTSPOTS().forEach(h=>{\n      const mk=this._markers[h.id]; if(!mk) return;\n      const visible=h.from<=t;\n      mk.getElement().style.display=visible?'block':'none';\n      if(visible) mk.getElement().innerHTML=this._markerHTML(h);\n    });\n    if(this._deploy){\n      const show=this.state.view==='deployment';\n      Object.values(this._deploy).forEach(el=>el.style.display=show?'block':'none');\n    }\n  }\n\n  _updateCamera(){\n    if(!this._map) return;\n    const el=this.state.eventLoc;\n    const v=this.state.view;\n    const opts={duration:1400,essential:true};\n    if(v==='analysis'){ this._map.flyTo({center:[el.lng,el.lat],zoom:13.2,pitch:58,bearing:-12,...opts}); }\n    else if(v==='command'){ this._map.flyTo({center:[77.64,12.97],zoom:11.4,pitch:60,bearing:-22,...opts}); }\n    else if(v==='deployment'){ this._map.flyTo({center:[77.66,12.97],zoom:11.0,pitch:48,bearing:-10,...opts}); }\n    else { this._map.flyTo({center:[77.625,12.965],zoom:11.05,pitch:55,bearing:-17,...opts}); }\n  }\n\n  _startRotate(){\n    // One-time cinematic intro sweep — gentle settle, then hand control to the user.\n    if(!this._map) return;\n    this._map.easeTo({bearing:-7, pitch:57, zoom:11.15, duration:5200,\n      easing:t=>1-Math.pow(1-t,3), essential:true});\n  }\n\n  _onSrcInput(e){\n    const q = e.target.value;\n    this.setState({srcText:q, srcOpen:true});\n    clearTimeout(this._srchT);\n    this._srchT = setTimeout(()=>{\n      // Real OSM Nominatim geocoding (falls back to a Bengaluru gazetteer offline)\n      const lookup = this._mappls ? this._mappls.geocode(q) : Promise.resolve([]);\n      lookup.then(rs=>this.setState({srcResults:(rs||[]).slice(0,6)}));\n    }, 350);\n  }\n  _pickSrc(r){\n    this.setState({srcText:r.name, srcOpen:false});\n    this._setEvent(r);\n  }\n  // Venue field — the event epicenter; geocodes + recomputes everything\n  _onVenueInput(e){\n    const q=e.target.value;\n    this.setState({venueText:q, venueOpen:true});\n    clearTimeout(this._venT);\n    this._venT=setTimeout(()=>{\n      const lookup=this._mappls?this._mappls.geocode(q):Promise.resolve([]);\n      lookup.then(rs=>this.setState({venueResults:(rs||[]).slice(0,6)}));\n    },350);\n  }\n  _pickVenue(r){\n    this.setState({venueText:r.name, venueOpen:false});\n    this._setEvent(r); // componentDidUpdate recenters on the eventLoc change\n  }\n  // Set the active event location → drives recompute + recenter (via componentDidUpdate)\n  _setEvent(r){\n    if(!(isFinite(r.lng)&&isFinite(r.lat))) return;\n    this.setState(s=>({eventLoc:{name:r.name,lng:r.lng,lat:r.lat}, simRun:s.simRun+1}));\n    if(this._mappls) this._mappls.distanceMatrix([{lat:r.lat,lng:r.lng},{lat:12.9698,lng:77.5959}]).catch(()=>{});\n  }\n  // Manual \"Center Event\" — the only non-location-change way to recenter\n  _centerEvent(){\n    const e=this.state.eventLoc;\n    if(this._map && e){ this._userInteract=Date.now();\n      this._map.flyTo({center:[e.lng,e.lat],zoom:13.2,pitch:58,bearing:-12,duration:1300,essential:true}); }\n  }\n  // \"Analyze Impact\" — geocode whatever is typed, pivot the whole sim to it\n  _analyze(){\n    const q=this.state.srcText;\n    const go=(loc)=>{ this._setEvent(loc); this.setState({view:'analysis'}); };\n    const cur=this.state.eventLoc;\n    if(cur && cur.name && q && q.indexOf(cur.name)===0){ go(cur); return; }\n    const lookup=this._mappls?this._mappls.geocode(q):Promise.resolve([]);\n    lookup.then(rs=>{ if(rs&&rs.length) go(rs[0]); else this.setState({view:'analysis'}); });\n  }\n  // Haversine distance (km)\n  _km(a,b){ const R=6371,dLat=(b.lat-a.lat)*Math.PI/180,dLng=(b.lng-a.lng)*Math.PI/180,\n    s=Math.sin(dLat/2)**2+Math.cos(a.lat*Math.PI/180)*Math.cos(b.lat*Math.PI/180)*Math.sin(dLng/2)**2;\n    return 2*R*Math.asin(Math.sqrt(s)); }\n  // Corridors ranked by proximity to a location\n  _affected(loc){ return this.CORRIDORS().map(c=>({...c,dist:this._km(loc,{lng:c.lng,lat:c.lat})}))\n    .sort((a,b)=>a.dist-b.dist); }\n  componentWillUnmount(){ clearInterval(this._clk); clearInterval(this._play); if(this._raf) cancelAnimationFrame(this._raf); if(this._rej) window.removeEventListener('unhandledrejection', this._rej); if(this._map) this._map.remove(); }\n  _tick(){\n    const d=new Date();\n    const p=n=>String(n).padStart(2,'0');\n    this.setState({clock:`${p(d.getHours())}:${p(d.getMinutes())}:${p(d.getSeconds())}`});\n  }\n\n  // ---- static reference data ----\n  COLORS(){return{free:'#22C55E',moderate:'#EAB308',heavy:'#F59E0B',severe:'#EF4444'};}\n  // ===== REAL ASTraM pipeline data (Stage-2 EVITAS + Stage-3 ILP optimizer) =====\n  // [name, code, mean_evitas, max_evitas, band, total_officers, event_count, orange_events, closure_rate, deployment_effectiveness, lng, lat]\n  RAW(){\n    return [\n      ['Varthur Road','VTR',61.5,83.3,'ORANGE',8,77,39,0.117,0.875,77.71594,12.95655],\n      ['Mysore Road','MYS',57.0,91.0,'YELLOW',6,743,245,0.110,0.833,77.56365,12.95779],\n      ['CBD 1','CBD1',53.4,70.2,'YELLOW',1,26,3,0.115,0.0,77.60682,12.98102],\n      ['ORR North 1','ORRN1',52.4,79.7,'YELLOW',1,275,27,0.080,0.0,77.63744,13.02455],\n      ['Airport New Sou sure,eff,lng,lat,\n        lvl:this._lvl(evitas), delay:Math.round(evitas*0.42),\n        barricades: orange>=200?3:orange>=20?2:officers>0?1:0};\n    });\n  }\n  HOTSPOTS(){\n    // Map markers = the corridors that received officers (ILP-selected), staged onto the timeline by risk rank\n    const deployed=this.CORRIDORS().filter(c=>c.officers>0);\n    return deployed.map((c,i)=>({id:c.id,name:c.name,lng:c.lng,lat:c.lat,lvl:c.lvl,\n      base:34+(c.evitas-38)*1.7, evitas:c.evitas, officers:c.officers,\n      from: i<4?0:i<10?1:2}));\n  }\n  EVENT_TYPES(){return['Political Rally','Festival','Sports Event','Construction','VIP Movement','Accident','Public Gathering'];}\n\n  // ---- derived ----\n  sevMult(){ return 1 + this.state.t*0.42; }\n  activeHotspots(){\n    const t=this.state.t;\n    return this.HOTSPOTS().filter(h=>h.from<=t);\n  }\n  selected(){ return this.HOTSPOTS().find(h=>h.id===this.state.selId) || this.HOTSPOTS()[0]; }\n\n  insight(){\n    const m=this.sevMult();\n    const baseAtt = this.state.crowd;\n    const factor = {'Political Rally':1,'Festival':1.18,'Sports Event':1.08,'Construction':.62,'VIP Movement':.55,'Accident':.72,'Public Gathering':.92}[this.state.eventType]||1;\n    const ranked = this._affected(this.state.eventLoc);\n    // Impact radius (km) grows with crowd magnitude, event type and horizon\n    const impactKm = +(( 0.8 + (baseAtt/12000)*2.4 ) * factor * (0.9+0.16*this.state.t)).toFixed(1);\n    // Affected corridors = real ASTraM corridors within the impact radius of the venue\n    let affected = ranked.filter(c=>c.dist<=impactKm);\n    if(affected.length===0) affected=[ranked[0]];\n    affected = affected.slice(0,6);\n    // proximity-weighted mean EVITAS of the affected set drives the whole prediction\n    const wnorm = affected.reduce((a,c)=>a + 1/(0.6+c.dist),0);\n    const meanEv = affected.reduce((a,c)=>a + c.evitasRaw/(0.6+c.dist),0)/wnorm;\n    let score = Math.min(99, Math.round((meanEv*0.72 + baseAtt/1000*1.05 + affected.length*1.8) * factor * (0.9+0.11*this.state.t)));\n    const wi=this.state.whatIf;\n    let delay = Math.round((meanEv*0.2 + baseAtt/1300) * factor * m);\n    const baseDelay = delay;\n    if(wi.officers) delay = Math.round(delay*0.78);\n    if(wi.barricades) delay = Math.round(delay*0.85);\n    if(wi.diversion) delay = Math.round(delay*0.70);\n    const roads = affected.length;\n    // Manpower built up from each affected corridor's ILP officer baseline × event scale\n    const ilpOff = affected.reduce((a,c)=>a + Math.max(1,c.officers),0);\n    const officers = Math.max(2, Math.round(ilpOff*(0.8 + baseAtt/9000)*factor + this.state.t));\n    const barricades = Math.max(1, Math.round(affected.reduce((a,c)=>a + c.barricades,0)*0.6 + (baseAtt/14000)*factor + (wi.barricades?1:0) + this.state.closure/45));\n    const conf = Math.min(97, 82 + this.state.t*2 + Math.min(7, affected.reduce((a,c)=>a+c.events,0)/380));\n    const risk = score>=85?'CRITICAL':score>=68?'HIGH':score>=50?'MODERATE':'LOW';\n    const relief = ranked.find(c=>c.dist>impactKm*0.6 && c.evitasRaw<46) || ranked.find(c=>c.evitasRaw<46) || ranked[ranked.length-1];\n    // Recovery estimate (min to clear) — scales with delay, event duration and road-closure %\n    const recovery = Math.round(delay * (1.1 + this.state.duration*0.18 + this.state.closure/120) * (wi.diversion?0.82:1));\n    return {score,delay,baseDelay,roads,officers,barricades,conf,risk,att:baseAtt,\n            impactKm, affected, relief, recovery, nearName:ranked[0].name};\n  }\n\n  renderVals(){\n    const C=this.COLORS();\n    const light = this.state.theme==='light';\n    const m=this.sevMult();\n    const sel=this.selected();\n\n    // nav\n    const views=[['map','Live Map'],['command','Command'],['analysis','Analysis'],['deployment','Deployment']];\n    const navItems = views.map(([id,label])=>{\n      const on=this.state.view===id;\n      return {label, dot: on?'var(--secondary)':'var(--faint)',\n        fg: on?'#fff':'var(--dim)',\n        bg: on?'linear-gradient(135deg,rgba(99,102,241,.9),rgba(6,182,212,.8))':'transparent',\n        sh: on?'0 0 16px rgba(99,102,241,.4)':'none',\n        onClick:()=>this.setState({view:id})};\n    });\n\n    // hotspots\n    const glowMap={severe:'rgba(239,68,68,.45)',heavy:'rgba(245,158,11,.4)',moderate:'rgba(234,179,8,.34)',free:'rgba(34,197,94,.3)'};\n    const hotspots = this.activeHotspots().map(h=>{\n      const col = C[h.lvl];\n      const ring = h.base * m;\n      const colH = ({severe:88,heavy:62,moderate:40,free:24}[h.lvl]) * (0.85+0.35*(m-1));\n      const sel = h.id===this.state.selId;\n      return {x:h.x,y:h.y,color:col,glow:glowMap[h.lvl],ring,halo:ring*1.5,col:colH,\n        dot: sel?18:13, name:h.name, evitas:h.evitas,\n        labelBg: sel?'var(--surface)':'var(--glass)',\n        labelBrd: sel?col:'var(--glassbrd)', labelScale: sel?1.12:1,\n        onClick:()=>this.setState({selId:h.id})};\n    });\n\n    // blast on selected (map + analysis)\n    const showBlast = (this.state.view==='map'||this.state.view==='analysis');\n    const blast = showBlast ? {x:sel.x,y:sel.y,d:Math.round(sel.base*3.2*m)} : null;\n\n    // timeline stops\n    const stopsDef=[['NOW',0,'0%'],['+30m',1,'33.33%'],['+1h',2,'66.66%'],['+2h',3,'100%']];\n    const tStops = stopsDef.map(([label,idx,pos])=>{\n      const on=this.state.t===idx, active=this.state.t>=idx;\n      return {label,pos, size:on?'14px':'11px',\n        fill: active?'var(--secondary)':'var(--surface)',\n        brd: active?'var(--secondary)':'var(--faint)',\n        glow: on?'0 0 12px var(--secondary)':'none',\n        fg: on?'var(--secondary)':'var(--faint)',\n        onClick:()=>this.setState({t:idx})};\n    });\n    const tLabels=['NOW · Live','+30 min forecast','+1 hour forecast','+2 hour forecast'];\n\n    // deployment markers\n    const dm=[\n      {x:900,y:718,icon:'\\u25B2',type:'b'},{x:1140,y:388,icon:'\\u25B2',type:'b'},\n      {x:1075,y:288,icon:'P',type:'o'},{x:1180,y:470,icon:'P',type:'o'},\n      {x:1095,y:425,icon:'P',type:'o'},{x:800,y:176,icon:'\\u25B2',type:'b'}\n    ];\n    const deployMarkers = dm.map(d=>d.type==='o'\n      ? {x:d.x,y:d.y,icon:d.icon,bg:'rgba(99,102,241,.92)',brd:'rgba(165,180,252,.9)',glow:'rgba(99,102,241,.6)'}\n      : {x:d.x,y:d.y,icon:d.icon,bg:'rgba(245,158,11,.92)',brd:'rgba(253,224,71,.9)',glow:'rgba(245,158,11,.6)'});\n\n    // ===== panel data =====\n    const ins = this.insight();\n    const riskColor = {CRITICAL:'var(--critical)',HIGH:'var(--warning)',MODERATE:'var(--amber)',LOW:'var(--success)'}[ins.risk];\n    const gaugeBg = `conic-gradient(${riskColor} ${ins.score*3.6}deg, rgba(124,142,200,.14) 0deg)`;\n    const diversion = ins.relief ? ('via ' + ins.relief.name) : 'ORR East Route';\n    const affectedList = (ins.affected||[]).map(c=>({name:c.name, evitas:Math.round(c.evitasRaw),\n      dist:c.dist.toFixed(1)+' km', color:C[this._lvl(c.evitasRaw)]}));\n    // ===== AI Copilot — dynamic operational brief generated from the live simulation =====\n    const evName=this.state.eventLoc.name;\n    const topCorr=(ins.affected||[])[0];\n    const reliefNm=ins.relief?ins.relief.name:'ORR East';\n    const copilotBrief = [\n      {t:'Situation', d:`A ${this.state.eventType.toLowerCase()} at ${evName} with ~${this.state.crowd.toLocaleString('en-IN')} attendees projects a ${ins.risk} congestion risk (EVITAS ${ins.score}) across ${ins.roads} corridor${ins.roads>1?'s':''} within a ${ins.impactKm} km blast radius.`},\n      {t:'Primary corridor', d:`${topCorr?topCorr.name:'the nearest corridor'} carries the highest exposure${topCorr?` (EVITAS ${Math.round(topCorr.evitasRaw)}, ${topCorr.dist.toFixed(1)} km from venue)`:''}; expect ~${ins.delay} min added delay at peak.`},\n      {t:'Manpower', d:`Allocate ${ins.officers} officers and ${ins.barricades} barricade${ins.barricades>1?'s':''} concentrated on the affected set; this is built from the ILP baseline scaled to the event.`},\n      {t:'Diversion', d:`Route inbound traffic 3.8*m2).toFixed(1),color:'var(--amber)',bg:'rgba(234,179,8,.1)',pop:'76,500'}\n    ];\n    const explain=[\n      {label:'Event crowd density',w:88,color:'var(--critical)'},\n      {label:'Corridor base saturation',w:74,color:'var(--warning)'},\n      {label:'Peak-hour overlap',w:61,color:'var(--amber)'},\n      {label:'Historical incident rate',w:47,color:'var(--secondary)'},\n      {label:'Weather · clear',w:18,color:'var(--success)'}\n    ].map(e=>({...e, wpct:e.w+'%'}));\n\n    // Real ILP deployment manifest — corridors that received officers, ranked\n    const bandColor={ORANGE:'var(--warning)',YELLOW:'var(--amber)',RED:'var(--critical)',GREEN:'var(--success)'};\n    const deployed=this.CORRIDORS().filter(c=>c.officers>0);\n    const manifest=deployed.slice(0,7).map((c,i)=>({zone:c.name,officers:c.officers,barricades:c.barricades,\n      eta:(3+i)+' min',color:bandColor[c.band]||'var(--amber)'}));\n    const totOfficers=this.CORRIDORS().reduce((a,b)=>a+b.officers,0); // = 30 (ILP)\n    const totBar=this.CORRIDORS().reduce((a,b)=>a+b.barricades,0);\n\n    return {\n      theme:this.state.theme,\n      darkMapOp: light?0:1, lightMapOp: light?1:0,\n      mapScale: this.state.view==='command'?0.78:0.62,\n      heatOp: 0.4 + this.state.t*0.12,\n      navItems,\n      navRail:[['overview','Overview','map','\\u25C8'],['events','Live Events','map','\\u25C9'],['sim','Simulation','map','\\u25C6'],['risk','Risk Analysis','analysis','\\u25B2'],['deploy','Deployment','deployment','\\u25C7'],['resource','Resources','deployment','\\u25A5'],['replay','Replay','command','\\u27F2'],['reports','Reports','command','\\u25A4']].map(([id,label,view,icon])=>({id,label,icon,fg:this.state.activeModule===id?'#fff':'var(--dim)',bg:this.state.activeModule===id?'linear-gradient(135deg,rgba(99,102,241,.92),rgba(6,182,212,.82))':'transparent',sh:this.state.activeModule===id?'0 0 14px rgba(99,102,241,.4)':'none',onClick:()=>this.setState({activeModule:id,view})})),\n      // Stage-2 EVITAS event-count distribution (real ASTraM shape, banded at 40/60/80)\n      evitasHist: [[28,60],[32,150],[36,260],[40,330],[44,440],[48,360],[52,250],[56,150],[60,95],[64,70],[68,46],[72,30],[76,16],[80,6],[84,3]].map(([s,n])=>({\n        n, h:Math.round(n/440*100)+'%',\n        color: s>=80?'#EF4444':s>=60?'#F59E0B':s>=40?'#EAB308':'#22C55E', score:s })),\n      moduleName: ({overview:'Overview',events:'Live Events',sim:'Event Simulation',risk:'Risk Analysis',deploy:'Deployment Planner',resource:'Resource Allocation',replay:'Historical Replay',reports:'Reports'}[this.state.activeModule]||'Overview'),\n      eventCorridors: this._affected(this.state.eventLoc).filter(c=>c.dist<=4).length,\n      clock:this.state.clock,\n      knobLeft: light?'34px':'2px',\n      themeIcon: light\n        ? React.createElement('svg',{width:14,height:14,viewBox:'0 0 24 24',fill:'none',stroke:'#fff','strokeWidth':2,strokeLinecap:'round'},React.createElement('circle',{cx:12,cy:12,r:4}),...[0,45,90,135,180,225,270,315].map(a=>{const r=a*Math.PI/180;return React.createElement('line',{key:a,x1:12+Math.cos(r)*7,y1:12+Math.sin(r)*7,x2:12+Math.cos(r)*9.5,y2:12+Math.sin(r)*9.5})}))\n        : React.createElement('svg',{width:14,height:14,viewBox:'0 0 24 24',fill:'#fff'},React.createElement('path',{d:'M21 12.8A9 9 0 1 1 11.2 3a7 7 0 0 0 9.8 9.8z'})),\n      hotspots,\n      blast, showDiversion: this.state.whatIf.diversion || this.state.view==='analysis',\n      showDeploy: this.state.view==='deployment', deployMarkers,\n      showTimeline: this.state.view==='map'||this.state.view==='command',\n      tLabel: tLabels[this.state.t], tPct: (this.state.t/3*100)+'%', tStops,\n      playIcon: this.state.playing\n        ? React.createElement('svg',{width:13,height:13,viewBox:'0 0 24 24',fill:'#fff'},React.createElement('rect',{x:6,y:5,width:4,height:14,rx:1}),React.createElement('rect',{x:14,y:5,width:4,height:14,rx:1}))\n        : React.createElement('svg',{width:13,height:13,viewBox:'0 0 24 24',fill:'#fff'},React.createElement('path',{d:'M7 4l13 8-13 8z'})),\n      toggleTheme:()=>this.setState({theme:light?'dark':'light'}),\n      playTimeline:()=>this._togglePlay(),\n      // panel data\n      view:this.state.view, isMap:this.state.view==='map', isCmd:this.state.view==='command',\n      isAna:this.state.view==='analysis', isDep:this.state.view==='deployment',\n      selName: sel.name, selLvl: sel.lvl.toUpperCase(), selColor: C[sel.lvl],\n      ins, riskColor, gaugeBg, diversion, scoreStr:String(ins.score),\n      delayStr: '+'+ins.delay+' min', baseDelayStr:'+'+ins.baseDelay+' min',\n      confStr: ins.conf+'%', confPct: ins.conf+'%', attStr: ins.att.toLocaleString('en-IN'),\n      corr, eventChips, whatIfControls,\n      crowd:this.state.crowd, crowdStr:this.state.crowd.toLocaleString('en-IN'),\n      setCrowd:(e)=>this.setState({crowd:+e.target.value}),\n      duration:this.state.duration, durationStr:this.state.duration+' hr'+(this.state.duration>1?'s':''),\n      setDuration:(e)=>this.setState({duration:+e.target.value}),\n      closure:this.state.closure, closureStr:this.state.closure+'%',\n      setClosure:(e)=>this.setState({closure:+e.target.value}),\n      recoveryStr: ins.recovery+' min',\n      eventType:this.state.eventType,\n      analyze:()=>this._analyze(),\n      blastZones, explain, manifest, totOfficers, totBar,\n      savedPct: Math.round((1 - ins.delay/ins.baseDelay)*100)+'%',\n      affectedList, impactStr: ins.impactKm+' km', affectedCount: (ins.affected||[]).length,\n      copilotBrief, copilotChips, copilotOpen:this.state.copilotOpen,\n      toggleCopilot:()=>this.setState(s=>({copilotOpen:!s.copilotOpen})),\n      // Mappls Place Search bindings\n      srcText:this.state.srcText, srcOpen:this.state.srcOpen,\n      onSrcInput:(e)=>this._onSrcInput(e),\n      srcResults:(this.state.srcResults||[]).map(r=>({name:r.name,address:r.address,onPick:()=>this._pickSrc(r)})),\n      venueText:this.state.venueText, venueOpen:this.state.venueOpen,\n      onVenueInput:(e)=>this._onVenueInput(e),\n      venueResults:(this.state.venueResults||[]).map(r=>({name:r.name,address:r.address,onPick:()=>this._pickVenue(r)})),\n      centerEvent:()=>this._centerEvent(),\n      // Mappls base-layer status chip\n      mapplsStatus:this.state.mapplsStatus,\n      mapplsLabel: this.state.mapplsStatus==='live'?'Search API · Live':this.state.mapplsStatus==='connecting'?'Linking…':'Search API · Standby',\n      mapplsDot: this.state.mapplsStatus==='live'?'var(--success)':this.state.mapplsStatus==='connecting'?'var(--amber)':'var(--secondary)'\n    };\n  }\n\n  _togglePlay(){\n    if(this.state.playing){ clearInterval(this._play); this.setState({playing:false}); return; }\n    this.setState({playing:true});\n    this._play=setInterval(()=>{\n      this.setState(s=>{ const nt=(s.t+1)%4; return {t:nt}; });\n    },1600);\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
